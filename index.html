<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>درسیار | سامانه مدیریت محتوای آموزشی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1e3a5f;
            --primary-dark: #0f2b45;
            --primary-light: #2d5a87;
            --secondary: #c9a03d;
            --secondary-dark: #b08a2e;
            --accent: #d4af37;
            --success: #2e7d32;
            --danger: #c62828;
            --warning: #ed6c02;
            --dark: #0a1927;
            --light: #f5f7fa;
            --gray: #5a6e7a;
            --gray-light: #e8edf2;
            --white: #ffffff;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
        }
        body { font-family: 'Vazirmatn', sans-serif; background: linear-gradient(145deg, #f0f4f8 0%, #e8edf5 100%); color: var(--dark); min-height: 100vh; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--gray-light); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 10px; }
        .header { background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow-sm); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; flex-wrap: wrap; gap: 16px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 38px; }
        .logo h1 { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-badge { background: linear-gradient(135deg, var(--secondary), var(--accent)); color: var(--primary-dark); padding: 4px 12px; border-radius: 100px; font-size: 10px; font-weight: 800; }
        .btn { padding: 10px 24px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.25s ease; border: none; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 2px 6px rgba(30,58,95,0.2); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: var(--primary-dark); font-weight: 700; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .user-panel { display: flex; align-items: center; gap: 12px; background: var(--gray-light); padding: 6px 20px 6px 12px; border-radius: 100px; }
        .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .user-name { font-weight: 800; font-size: 14px; color: var(--primary); }
        .user-coins { font-size: 11px; color: var(--secondary); font-weight: 700; }
        .hero-banner { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 50%, var(--secondary) 100%); border-radius: 28px; padding: 32px 40px; margin: 32px 0; position: relative; overflow: hidden; box-shadow: var(--shadow-lg); }
        .hero-banner::before { content: ''; position: absolute; top: -30%; right: -20%; width: 60%; height: 160%; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); transform: rotate(25deg); }
        .hero-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .hero-icon { font-size: 56px; color: rgba(255,255,255,0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.05); opacity: 0.5; } }
        .hero-text { flex: 1; color: white; font-size: 16px; font-weight: 500; line-height: 1.7; }
        .hero-badge { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 100px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .grade-btn { padding: 12px 32px; border-radius: 100px; font-weight: 700; background: white; border: none; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: inherit; font-size: 14px; box-shadow: var(--shadow-sm); }
        .grade-btn.active { background: var(--primary); color: white; }
        .grade-btn:hover:not(.active) { background: var(--gray-light); transform: translateY(-2px); }
        .tabs-wrapper { margin-bottom: 28px; border-bottom: 2px solid var(--gray-light); }
        .tab-btn { padding: 14px 28px; background: transparent; border: none; font-weight: 600; color: var(--gray); cursor: pointer; position: relative; white-space: nowrap; font-family: inherit; font-size: 14px; }
        .tab-btn.active { color: var(--primary); font-weight: 700; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; right: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; }
        .filter-chip { padding: 8px 24px; border-radius: 100px; background: white; border: 1px solid var(--gray-light); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 28px; margin: 32px 0; }
        .content-card { background: var(--white); border-radius: 24px; padding: 24px; transition: all 0.35s; position: relative; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.04); }
        .content-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-xl); }
        .vip-ribbon { position: absolute; top: 20px; left: 20px; background: linear-gradient(135deg, var(--secondary), var(--accent)); color: var(--primary-dark); padding: 5px 16px; border-radius: 100px; font-size: 11px; font-weight: 800; }
        .card-category { display: inline-block; background: var(--gray-light); padding: 4px 14px; border-radius: 100px; font-size: 11px; font-weight: 600; color: var(--primary); margin-bottom: 12px; }
        .card-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
        .card-desc { color: var(--gray); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
        .card-meta { display: flex; gap: 20px; margin-bottom: 16px; font-size: 12px; color: #94a3b8; flex-wrap: wrap; }
        .price-tag { background: var(--secondary); color: var(--primary-dark); padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; }
        .discount-badge { background: var(--warning); color: white; padding: 4px 10px; border-radius: 100px; font-size: 11px; }
        .rating-area { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .stars { display: flex; gap: 4px; }
        .stars i { color: var(--secondary); cursor: pointer; font-size: 16px; }
        .search-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .search-box { max-width: 600px; width: 100%; background: white; border-radius: 32px; padding: 32px; }
        .admin-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .admin-panel { background: white; border-radius: 32px; max-width: 1400px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px; }
        .footer { text-align: center; padding: 40px 24px; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: rgba(255,255,255,0.9); margin-top: 60px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 28px; border-radius: 100px; z-index: 2000; animation: toastAnim 2.8s forwards; display: flex; align-items: center; gap: 10px; }
        @keyframes toastAnim { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 12% { opacity: 1; transform: translateX(-50%) translateY(0); } 88% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @media (max-width: 768px) { .container { padding: 0 16px; } .content-grid { grid-template-columns: 1fr; } .hero-banner { padding: 24px; } .grade-btn { padding: 8px 20px; font-size: 13px; } .tab-btn { padding: 10px 16px; font-size: 13px; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .content-card { animation: fadeInUp 0.5s ease backwards; }
        .admin-stat-card { background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 20px; padding: 20px; text-align: center; color: white; transition: transform 0.2s; cursor: pointer; }
        .admin-stat-card:hover { transform: translateY(-3px); }
        .admin-stat-number { font-size: 32px; font-weight: 800; }
        .admin-tab-btn { padding: 10px 24px; border-radius: 40px; background: var(--gray-light); border: none; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.2s; margin: 4px; }
        .admin-tab-btn.active { background: var(--primary); color: white; }
        .user-row, .content-row { background: var(--gray-light); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .coin-input-group { display: flex; gap: 8px; align-items: center; }
        .coin-input-group input { width: 80px; padding: 8px; border-radius: 12px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--gray-light); }
        th { background: var(--primary); color: white; border-radius: 12px; }
        input, select, textarea { padding: 10px 14px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; }
        .empty-state { text-align: center; padding: 80px 20px; background: white; border-radius: 28px; }
        .empty-state i { font-size: 64px; color: var(--gray-light); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                <h1>درسیار</h1>
                <span class="logo-badge">سامانه مدیریت محتوا</span>
            </div>
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <button class="btn btn-outline" id="searchBtn"><i class="fas fa-search"></i> جستجو</button>
                <button class="btn btn-secondary" id="adminBtn"><i class="fas fa-crown"></i> 🛠️ پنل مدیریت</button>
                <div class="user-panel">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div class="user-avatar" id="userAvatar">👤</div>
                        <div>
                            <div class="user-name" id="userName">مهمان</div>
                            <div class="user-coins" id="userCoins"><i class="fas fa-coins"></i> 0 سکه</div>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="authBtn" style="padding: 6px 18px;">ورود</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="hero-banner">
        <div class="hero-content">
            <div class="hero-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="hero-text" id="announceText"></div>
            <div class="hero-badge" id="announceDate"><i class="far fa-calendar-alt"></i></div>
        </div>
    </div>
    <div style="margin: 28px 0 20px;"><div style="display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;" id="gradesList"></div></div>
    <div class="tabs-wrapper"><div style="display: flex; gap: 4px; overflow-x: auto;" id="tabsList"></div></div>
    <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;" id="filtersBar"></div>
    <div id="mainContent"></div>
</div>

<div class="footer">
    <p style="font-size: 16px; font-weight: 600;">© ۱۴۰۳ درسیار | پلتفرم رسمی آموزش ایران</p>
    <p style="font-size: 14px; margin-top: 8px; opacity: 0.9;">نسخه حرفه‌ای - مدیریت کامل محتوا</p>
</div>

<script>
    // ============ دیتابیس خام - بدون محتوای اولیه ============
    let DB = {
        grades: ['هفتم', 'هشتم', 'نهم'],
        subjects: ['ریاضی', 'فیزیک', 'شیمی', 'علوم', 'ادبیات', 'زبان انگلیسی', 'عربی', 'دینی', 'اجتماعی', 'هنر', 'برنامه‌نویسی'],
        sections: ['📚 جزوه', '📖 کتاب', '📝 نمونه سوال', '🎯 آزمون', '🎬 فیلم آموزشی', '🖼️ گالری', '💎 نکات طلایی', '⭐ سوالات ویژه'],
        contents: {},
        gallery: [],
        users: [
            { id: 'u1', username: 'admin', password: 'admin123', verified: true, role: 'admin', coins: 10000, avatar: '👑', email: 'admin@drsyar.com', phone: '09123456789', registerDate: '۱۴۰۳/۰۱/۰۱', level: 'طلایی', lastLogin: '۱۴۰۳/۱۰/۱۵', totalPurchases: 0, totalSpent: 0 }
        ],
        adminPass: 'admin123',
        announcement: { text: '🌟 به سامانه درسیار خوش آمدید! 🌟 | برای افزودن محتوا از پنل مدیریت استفاده کنید.', date: 'درسیار' },
        stats: { totalViews: 0, totalDownloads: 0, totalComments: 0, totalSales: 0, totalIncome: 0 }
    };

    // مقداردهی اولیه ساختار محتوا (خالی)
    for(let g of DB.grades) {
        DB.contents[g] = {};
        for(let s of DB.sections) {
            if(s !== '🖼️ گالری') DB.contents[g][s] = [];
        }
    }

    let currentUser = null;
    let currentGrade = 'هفتم';
    let currentSection = '📚 جزوه';
    let currentFilter = 'all';
    let currentSubject = 'all';

    function save() { localStorage.setItem('drsyar_empty', JSON.stringify(DB)); if(currentUser) localStorage.setItem('drsyar_user_empty', JSON.stringify({ username: currentUser.username })); }
    function load() { 
        let d = localStorage.getItem('drsyar_empty'); 
        if(d) DB = JSON.parse(d); 
        else save();
        let u = localStorage.getItem('drsyar_user_empty'); 
        if(u) { 
            let userData = JSON.parse(u); 
            currentUser = DB.users.find(x => x.username === userData.username) || null; 
        } 
    }
    function toast(msg, isError = false) { let t = document.createElement('div'); t.className = 'toast'; t.style.background = isError ? 'var(--danger)' : 'var(--primary-dark)'; t.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 2800); }
    function canAccessVip() { return currentUser && currentUser.verified === true; }
    function hasEnoughCoins(price) { return currentUser && currentUser.coins >= price; }
    
    function purchaseContent(item, grade, section) {
        if(!currentUser) { toast('لطفاً وارد شوید', true); return false; }
        let finalPrice = item.price - (item.price * (item.discount || 0) / 100);
        if(currentUser.coins >= finalPrice) {
            currentUser.coins -= finalPrice;
            currentUser.totalPurchases = (currentUser.totalPurchases || 0) + 1;
            currentUser.totalSpent = (currentUser.totalSpent || 0) + finalPrice;
            item.salesCount = (item.salesCount || 0) + 1;
            DB.stats.totalSales += finalPrice;
            DB.stats.totalIncome += finalPrice;
            save();
            toast(`✅ خرید موفق! ${finalPrice} سکه از حساب شما کسر شد`, false);
            render();
            return true;
        } else {
            toast(`❌ سکه کافی نیست! نیاز به ${finalPrice} سکه دارید`, true);
            return false;
        }
    }

    function searchContent(keyword) {
        let results = [];
        if(!keyword) return results;
        keyword = keyword.toLowerCase();
        for(let g of DB.grades) {
            for(let s of DB.sections) {
                if(DB.contents[g] && DB.contents[g][s]) {
                    DB.contents[g][s].forEach(item => {
                        if(item.title.toLowerCase().includes(keyword) || item.desc.toLowerCase().includes(keyword) || (item.subject && item.subject.toLowerCase().includes(keyword))) {
                            results.push({ ...item, grade: g, section: s });
                        }
                    });
                }
            }
        }
        return results;
    }

    function showSearchModal() {
        let modal = document.createElement('div');
        modal.className = 'search-modal';
        modal.innerHTML = `<div class="search-box"><h3 style="margin-bottom: 24px;"><i class="fas fa-search"></i> جستجو در درسیار</h3><input type="text" id="searchInput" placeholder="عنوان، درس، توضیحات..." style="width:100%;padding:14px;border:2px solid var(--gray-light);border-radius:16px;margin-bottom:20px;"><div id="searchResults" style="max-height:400px;overflow-y:auto;"></div><button class="btn-outline" onclick="this.closest('.search-modal').remove()" style="margin-top:20px;width:100%;">بستن</button></div>`;
        document.body.appendChild(modal);
        let input = document.getElementById('searchInput');
        input.addEventListener('input', (e) => {
            let results = searchContent(e.target.value);
            let resultsDiv = document.getElementById('searchResults');
            if(results.length === 0) resultsDiv.innerHTML = '<div style="text-align:center;padding:48px;"><i class="fas fa-search" style="font-size:48px;opacity:0.5;"></i><p style="margin-top:12px;">نتیجه‌ای یافت نشد</p></div>';
            else resultsDiv.innerHTML = results.map(r => `<div style="padding:14px;border-bottom:1px solid #ddd;cursor:pointer;" onclick="selectSearchResult('${r.grade}','${r.section}')"><strong>${r.title}</strong><div style="font-size:12px;color:gray;">${r.grade} - ${r.subject || 'عمومی'} - ${r.price || 0} سکه</div></div>`).join('');
        });
        input.focus();
    }
    window.selectSearchResult = (grade, section) => { currentGrade = grade; currentSection = section; document.querySelector('.search-modal')?.remove(); render(); toast(`نمایش ${grade} - ${section}`); };

    function render() {
        document.getElementById('gradesList').innerHTML = DB.grades.map(g => `<button class="grade-btn ${currentGrade === g ? 'active' : ''}" onclick="selectGrade('${g}')">پایه ${g}</button>`).join('');
        document.getElementById('tabsList').innerHTML = DB.sections.map(s => `<button class="tab-btn ${currentSection === s ? 'active' : ''}" onclick="selectSection('${s}')">${s}</button>`).join('');
        
        if(currentSection !== '🖼️ گالری') {
            document.getElementById('filtersBar').innerHTML = `
                <div class="filter-chip ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">همه</div>
                <div class="filter-chip ${currentFilter === 'normal' ? 'active' : ''}" onclick="setFilter('normal')">عمومی</div>
                <div class="filter-chip ${currentFilter === 'vip' ? 'active' : ''}" onclick="setFilter('vip')"><i class="fas fa-gem"></i> ویژه</div>
                <div class="filter-chip ${currentFilter === 'top' ? 'active' : ''}" onclick="setFilter('top')"><i class="fas fa-star"></i> پرامتیاز</div>
                <div class="filter-chip ${currentFilter === 'free' ? 'active' : ''}" onclick="setFilter('free')">🎁 رایگان</div>
                <div class="filter-chip ${currentFilter === 'subject' ? 'active' : ''}" onclick="showSubjectFilter()"><i class="fas fa-flask"></i> درس</div>
            `;
        } else document.getElementById('filtersBar').innerHTML = '';
        
        document.getElementById('announceText').innerHTML = DB.announcement.text;
        document.getElementById('announceDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${DB.announcement.date}`;
        
        if(currentUser) {
            document.getElementById('userName').innerHTML = `${currentUser.username} ${currentUser.verified ? '✓' : '⏳'} (${currentUser.level || 'برنزی'})`;
            document.getElementById('userCoins').innerHTML = `<i class="fas fa-coins"></i> ${currentUser.coins} سکه`;
            document.getElementById('userAvatar').innerText = currentUser.avatar || '👤';
            document.getElementById('authBtn').innerHTML = 'خروج';
            document.getElementById('authBtn').className = 'btn btn-outline';
        } else {
            document.getElementById('userName').innerHTML = 'مهمان';
            document.getElementById('userCoins').innerHTML = '<i class="fas fa-coins"></i> 0 سکه';
            document.getElementById('userAvatar').innerHTML = '👤';
            document.getElementById('authBtn').innerHTML = 'ورود';
            document.getElementById('authBtn').className = 'btn btn-primary';
        }
        if(currentSection === '🖼️ گالری') renderGallery();
        else renderContents();
    }
    
    function showSubjectFilter() {
        let subjects = [...new Set(DB.subjects)];
        let modal = document.createElement('div');
        modal.className = 'search-modal';
        modal.innerHTML = `<div class="search-box"><h3><i class="fas fa-flask"></i> انتخاب درس</h3><div style="display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;">${subjects.map(s => `<button class="btn-outline" onclick="filterBySubject('${s}'); this.closest('.search-modal').remove()">${s}</button>`).join('')}<button class="btn-primary" onclick="filterBySubject('all'); this.closest('.search-modal').remove()">همه دروس</button></div></div>`;
        document.body.appendChild(modal);
    }
    
    window.filterBySubject = (subject) => { currentSubject = subject; render(); };
    
    function filterBySubjectContent(items) {
        if(currentSubject === 'all') return items;
        return items.filter(i => i.subject === currentSubject);
    }

    function renderContents() {
        let items = DB.contents[currentGrade]?.[currentSection] || [];
        items = filterBySubjectContent(items);
        let filtered = [...items];
        if(currentFilter === 'vip') filtered = filtered.filter(i => i.vip);
        if(currentFilter === 'normal') filtered = filtered.filter(i => !i.vip);
        if(currentFilter === 'top') filtered.sort((a,b) => b.rating - a.rating);
        if(currentFilter === 'free') filtered = filtered.filter(i => (i.price - (i.price * (i.discount||0)/100)) === 0);
        
        if(filtered.length === 0) {

        let html = `<div class="content-grid">${filtered.map((item, idx) => {

        document.getElementById('mainContent').innerHTML = html;
        
        document.querySelectorAll('.stars').forEach(el => {

            }
            else if(tab === 'discounts') {
                contentDiv.innerHTML = `<div style="background:var(--gray-light);border-radius:20px;padding:24px;"><h3>🏷️ مدیریت تخفیف‌ها</h3><div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;"><select id="discountGrade"><option>هفتم</option><option>هشتم</option><option>نهم</option></select><select id="discountSection"><option>📚 جزوه</option><option>📖 کتاب</option><option>📝 نمونه سوال</option><option>🎯 آزمون</option><option>🎬 فیلم آموزشی</option><option>💎 نکات طلایی</option><option>⭐ سوالات ویژه</option></select><select id="discountContent"></select><input type="number" id="discountPercent" placeholder="درصد تخفیف" style="width:100px;"><button class="btn-success" onclick="applyDiscount()">اعمال تخفیف</button></div><div id="discountsList"></div></div>`;
                function updateDiscountContentSelect() {
                    let g = document.getElementById('discountGrade').value;
                    let s = document.getElementById('discountSection').value;
                    let select = document.getElementById('discountContent');
                    if(DB.contents[g] && DB.contents[g][s] && DB.contents[g][s].length > 0) {
                        select.innerHTML = DB.contents[g][s].map((c,idx) => `<option value="${idx}">${c.title} - ${c.price} سکه</option>`).join('');
                    } else {
                        select.innerHTML = '<option value="-1">محتوایی وجود ندارد</option>';
                    }
                }
                document.getElementById('discountGrade').onchange = updateDiscountContentSelect;
                document.getElementById('discountSection').onchange = updateDiscountContentSelect;
                updateDiscountContentSelect();
                window.applyDiscount = () => {
                    let g = document.getElementById('discountGrade').value;
                    let s = document.getElementById('discountSection').value;
                    let idx = parseInt(document.getElementById('discountContent').value);
                    let percent = parseInt(document.getElementById('discountPercent').value);
                    if(idx >= 0 && percent >= 0 && percent <= 100 && DB.contents[g][s][idx]) {
                        DB.contents[g][s][idx].discount = percent;
                        save();
                        toast(`تخفیف ${percent}% اعمال شد`);
                        loadAdminTab('discounts');
                    } else toast('درصد نامعتبر یا محتوا وجود ندارد', true);
                };
                let discHtml = ' <meta charset="UTF-8"><table> <tr><th>محصول</th><th>پایه</th><th>قیمت اصلی</th><th>قیمت با تخفیف</th><th>درصد</th><th>عملیات</th></tr>';
                for(let g of DB.grades) for(let s of DB.sections) if(DB.contents[g]?.[s]) DB.contents[g][s].forEach((c, idx) => {
                    if(c.discount > 0) {
                        let finalPrice = c.price - (c.price * c.discount / 100);
                        discHtml += `<tr><td>${c.title}</td><td>${g}</td><td>${c.price}</td><td>${finalPrice}</td><td>${c.discount}%</td><td><button class="btn-danger" onclick="removeDiscount('${g}','${s}',${idx})">حذف تخفیف</button></td></tr>`;
                    }
                });
                discHtml += '</table>';
                document.getElementById('discountsList').innerHTML = discHtml;
                window.removeDiscount = (g,s,idx) => { DB.contents[g][s][idx].discount = 0; save(); loadAdminTab('discounts'); toast('تخفیف حذف شد'); };
            }
            else if(tab === 'subjects') {
                contentDiv.innerHTML = `<div style="background:var(--gray-light);border-radius:20px;padding:24px;"><h3>📚 مدیریت دروس</h3><div style="display:flex;gap:12px;margin-bottom:24px;"><input type="text" id="newSubject" placeholder="نام درس جدید"><button class="btn-success" onclick="addNewSubject()">➕ افزودن درس</button></div><div id="subjectsList"></div></div>`;
                let subjectsHtml = '<div style="display:flex;flex-wrap:wrap;gap:12px;">';
                DB.subjects.forEach((s, idx) => { subjectsHtml += `<span style="background:white;padding:8px 16px;border-radius:100px;box-shadow:var(--shadow-sm);">${s} <button class="btn-danger" onclick="removeSubject(${idx})" style="padding:2px 8px;margin-right:8px;">✖</button></span>`; });
                subjectsHtml += '</div>';
                document.getElementById('subjectsList').innerHTML = subjectsHtml;
                window.addNewSubject = () => { let newSub = document.getElementById('newSubject').value; if(newSub && !DB.subjects.includes(newSub)) { DB.subjects.push(newSub); save(); loadAdminTab('subjects'); toast('درس اضافه شد'); document.getElementById('newSubject').value = ''; } else toast('درس تکراری یا نامعتبر', true); };
                window.removeSubject = (idx) => { if(confirm('حذف شود؟')) { DB.subjects.splice(idx,1); save(); loadAdminTab('subjects'); toast('درس حذف شد'); } };
            }
            else if(tab === 'gallery') {
                contentDiv.innerHTML = `<div style="background:var(--gray-light);border-radius:20px;padding:24px;"><div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;"><input type="text" id="gUrl" placeholder="آدرس تصویر یا GIF" style="min-width:300px;"><select id="gType"><option>image</option><option>gif</option></select><input type="text" id="gCaption" placeholder="عنوان"><button class="btn-success" onclick="addGalleryAdmin()">➕ افزودن</button></div><div id="galleryListAdmin"></div></div>`;
                renderGalleryList();
                window.renderGalleryList = () => { 
                    if(DB.gallery.length === 0) {
                        document.getElementById('galleryListAdmin').innerHTML = '<div class="empty-state" style="padding:40px;"><i class="fas fa-images"></i><p>گالری خالی است</p></div>';
                    } else {
                        document.getElementById('galleryListAdmin').innerHTML = DB.gallery.map((g,idx) => `<div class="user-row"><span><img src="${g.url}" style="width:60px;height:45px;object-fit:cover;border-radius:8px;"> ${g.caption} (${g.type})</span><button class="btn-danger" onclick="deleteGalleryAdmin(${idx})">حذف</button></div>`).join('');
                    }
                };
                window.addGalleryAdmin = () => { let url = document.getElementById('gUrl').value, type = document.getElementById('gType').value, cap = document.getElementById('gCaption').value; if(url) { DB.gallery.push({ id: 'g'+Date.now(), type, url, caption: cap || 'بدون عنوان', likes: 0, date: new Date().toLocaleDateString('fa-IR') }); save(); renderGalleryList(); updateAdminStats(); toast('به گالری اضافه شد'); document.getElementById('gUrl').value = ''; document.getElementById('gCaption').value = ''; } else toast('آدرس تصویر الزامی است', true); };
                window.deleteGalleryAdmin = (idx) => { if(confirm('حذف شود؟')) { DB.gallery.splice(idx,1); save(); renderGalleryList(); updateAdminStats(); toast('حذف شد'); } };
                renderGalleryList();
            }
            else if(tab === 'settings') {
                contentDiv.innerHTML = `<div style="background:var(--gray-light);border-radius:20px;padding:24px;"><div><h3>🔐 تغییر رمز مدیریت</h3><input type="password" id="newAdminPass" placeholder="رمز جدید" style="width:200px;"><button class="btn-warning" onclick="changeAdminPassAdmin()" style="margin-top:8px;">تغییر رمز</button></div><hr style="margin:20px 0;"><div><h3 style="color:var(--danger);">⚠️ خطر!</h3><button class="btn-danger" onclick="resetAllDataAdmin()">بازنشانی کامل داده‌ها</button><button class="btn-outline" onclick="exportFullDatabase()" style="margin-right:12px;">📥 خروجی کامل دیتابیس</button><button class="btn-outline" onclick="importDatabase()" style="margin-right:12px;">📤 بازیابی دیتابیس</button><input type="file" id="importFile" style="display:none;" accept=".json" onchange="handleImport(event)"></div></div>`;
                window.changeAdminPassAdmin = () => { let p = document.getElementById('newAdminPass').value; if(p) { DB.adminPass = p; save(); toast('رمز مدیریت تغییر کرد'); document.getElementById('newAdminPass').value = ''; } };
                window.resetAllDataAdmin = () => { if(confirm('⚠️ هشدار! همه چیز پاک می‌شود! آیا مطمئن هستید؟')) { localStorage.clear(); toast('داده‌ها پاک شد. صفحه رفرش می‌شود'); setTimeout(()=>location.reload(),1500); } };
                window.exportFullDatabase = () => { let dataStr = JSON.stringify(DB, null, 2); let dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr); let link = document.createElement('a'); link.setAttribute('href', dataUri); link.setAttribute('download', `drsyar_backup_${Date.now()}.json`); link.click(); toast('بکاپ کامل گرفته شد'); };
                window.importDatabase = () => { document.getElementById('importFile').click(); };
                window.handleImport = (event) => { let file = event.target.files[0]; if(file) { let reader = new FileReader(); reader.onload = (e) => { try { let imported = JSON.parse(e.target.result); if(imported.grades && imported.users && imported.contents) { DB = imported; save(); toast('دیتابیس با موفقیت بازیابی شد. صفحه رفرش می‌شود'); setTimeout(()=>location.reload(),1500); } else toast('فایل نامعتبر', true); } catch(err) { toast('خطا در خواندن فایل', true); } }; reader.readAsText(file); } };
            }
        }
        
        updateAdminStats();
        loadAdminTab('dashboard');
        
        document.querySelectorAll('.admin-tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadAdminTab(btn.dataset.tab);
            };
        });
        document.querySelector('.admin-tab-btn').classList.add('active');
    }

    load();
    render();
</script>
</body>
</html>
