<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>درسیار | نسخه کیهانی ۰.۶۱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* تم فضایی با آسمان پرستاره و شهاب سنگ */
        body {
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            background: radial-gradient(ellipse at bottom, #0d1d31 0%, #0c0d13 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            color: #f0f0f0;
        }

        /* ستاره‌های ساکن */
        .star {
            position: fixed;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* شهاب سنگ متحرک */
        .shooting-star {
            position: fixed;
            top: 0;
            left: 0;
            width: 2px;
            height: 2px;
            background: linear-gradient(45deg, rgba(255,255,255,1), rgba(255,255,255,0));
            border-radius: 50%;
            filter: blur(1px);
            animation: shoot 4s linear infinite;
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateX(-300px) translateY(300px);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* هدر شیشه‌ای کیهانی */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(15px);
            padding: 15px 25px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(165,180,252,0.5);
        }

        .logo span {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            padding: 0 8px;
        }

        button {
            background: rgba(30, 40, 60, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(100, 120, 200, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* کارت‌ها با افکت شیشه‌ای و نور */
        .grade-card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            width: 200px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .grade-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255,215,0,0.6);
            box-shadow: 0 0 25px rgba(255,215,0,0.3);
        }

        .grade-7 { border-top: 4px solid #3b82f6; }
        .grade-8 { border-top: 4px solid #10b981; }
        .grade-9 { border-top: 4px solid #f59e0b; }

        .panel, .admin-box, .modal-content {
            background: rgba(10, 20, 35, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* تب‌ها */
        .tabs {
            display: flex;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 25px;
        }
        .tab {
            background: transparent;
            border: none;
            color: #cbd5e1;
        }
        .tab.active {
            background: rgba(100, 120, 200, 0.8);
            color: white;
            box-shadow: 0 0 12px rgba(100,120,200,0.5);
        }

        /* آیتم‌ها */
        .subject {
            background: rgba(20, 30, 50, 0.6);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .subject-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 15px;
            border-right: 4px solid #fbbf24;
            padding-right: 15px;
        }
        .file-item {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        /* اعلان‌ها */
        .notice-board {
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2));
            border-right: 5px solid #fbbf24;
            padding: 15px 20px;
            border-radius: 24px;
            margin-bottom: 25px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .notice-text {
            flex: 1;
            color: #ffe6b3;
        }
        .edit-notice {
            background: #f59e0b;
            border: none;
            padding: 6px 16px;
        }
        /* فرم ادمین */
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid #334155;
            border-radius: 60px;
            color: white;
        }
        .btn {
            background: #4f46e5;
        }
        .btn-green { background: #10b981; }
        .btn-red { background: #ef4444; }
        .btn-warning { background: #f59e0b; }
        .toast {
            background: #1e293b;
            backdrop-filter: blur(10px);
            border: 1px solid #fbbf24;
        }
        .hidden { display: none; }
        .grades { display: flex; gap: 25px; justify-content: center; flex-wrap: wrap; margin: 40px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🚀 درسیار <span>نسخه کیهانی ۰.۶۱</span></div>
        <div><button onclick="toggleTheme()">🌙 تغییر تم</button> <button onclick="showAdmin()">⚡ پنل فرماندهی</button></div>
    </div>

    <div id="mainPage"><div class="grades" id="gradesList"></div></div>
    <div id="contentPage" class="hidden"></div>
    <div id="adminPage" class="hidden"></div>
</div>

<div id="modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); justify-content:center; align-items:center; z-index:2000;"><div class="modal-content" style="max-width:450px; width:90%;"><h3>💫 تکمیل خرید</h3><div id="modalInfo"></div><div id="modalBtns"></div><div id="modalMsg" class="hidden"><div id="modalCode" style="background:#0f172a; padding:14px; border-radius:20px; margin:15px 0; white-space:pre-wrap;"></div><button class="btn" onclick="copyCode()">📋 کپی سفارش</button></div><button class="btn btn-gray" onclick="closeModal()">بستن</button></div></div>

<script>
    // =============== فضای اعلانات و تنظیمات ===============
    const BIN_ID = "6a2e83cff5f4af5e29efa0ec";
    const API_KEY = "$2a$10$QiD9l/D7m8hTGNnFASLf2.n5VZe6yAIUolrrbDKirrpteGeBDGcwC";

    const MY_SOCIAL = {
        bale: { name: "بله", id: "@Arian_A_Game", link: "https://ble.ir/Arian_A_Game" },
        eitaa: { name: "ایتا", id: "@Arian_A_Game", link: "https://eitaa.com/Arian_A_Game" },
        rubika: { name: "روبیکا", id: "@Arian_A_Gane", link: "https://rubika.ir/Arian_A_Gane" }
    };

    let DB = null;
    let currentGrade = null, currentType = 'جزوه', currentProduct = null, adminLogged = false;
    let noticeText = "🌟 به درسیار خوش آمدید! جزوات، نمونه سوالات و کتاب‌های پایه هفتم، هشتم و نهم اینجا منتظر شماست. 🚀";

    function saveNotice() { localStorage.setItem('dresyar_notice', noticeText); }
    function loadNotice() { let n = localStorage.getItem('dresyar_notice'); if(n) noticeText = n; }

    function showToast(msg, isErr) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.style.position = 'fixed'; t.style.bottom = '20px'; t.style.left = '50%'; t.style.transform = 'translateX(-50%)';
        t.style.background = isErr ? '#ef4444' : '#10b981'; t.style.color = 'white'; t.style.padding = '12px 24px';
        t.style.borderRadius = '60px'; t.style.zIndex = '2100'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function loadData() {
        try {
            let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`);
            if (!res.ok) throw new Error();
            let data = await res.json();
            DB = data.record;
            if (!DB["7"]) DB = { "7": {}, "8": {}, "9": {} };
            showToast('🌌 اتصال به کهکشان درسیار برقرار شد');
        } catch(e) {
            DB = { "7": {}, "8": {}, "9": {} };
            showToast('⚠️ حالت آفلاین: داده‌ها محلیست', true);
        }
        showGrades();
    }

    async function saveData() {
        if (!adminLogged) return false;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(DB)
            });
            showToast('💾 ذخیره در فضای ابری انجام شد');
            return true;
        } catch(e) { showToast('❌ خطا در ذخیره', true); return false; }
    }

    function showGrades() {
        let grades = [
            {num:7, name:'هفتم', color:'#3b82f6'},
            {num:8, name:'هشتم', color:'#10b981'},
            {num:9, name:'نهم', color:'#f59e0b'}
        ];
        document.getElementById('gradesList').innerHTML = grades.map(g => `
            <div class="grade-card grade-${g.num}" style="border-top-color:${g.color}" onclick="selectGrade(${g.num})">
                <h2>پایه ${g.name}</h2>
                <p>دوره اول متوسطه</p>
            </div>
        `).join('');
    }

    function selectGrade(g) { currentGrade = g; currentType = 'جزوه'; document.getElementById('mainPage').classList.add('hidden'); renderContent(); }
    function renderContent() {
        let html = `<div class="panel"><div class="notice-board">📢 <span class="notice-text" id="noticeDisplay">${noticeText}</span><button class="edit-notice" onclick="editNotice()" style="display:${adminLogged?'inline-block':'none'}">✏️ ویرایش اعلان</button></div><div class="tabs">
            ${['جزوه','نمونه سوال','کتاب'].map(t => `<button class="tab ${currentType===t?'active':''}" onclick="changeType('${t}')">${t==='جزوه'?'📘':t==='نمونه سوال'?'📝':'📖'} ${t}</button>`).join('')}
        </div><div id="subjectsDiv"></div><button class="btn btn-gray" onclick="backToMain()">🔙 بازگشت</button></div>`;
        document.getElementById('contentPage').innerHTML = html;
        document.getElementById('contentPage').classList.remove('hidden');
        renderSubjects();
    }

    function renderSubjects() {
        let container = document.getElementById('subjectsDiv');
        let subjects = DB[currentGrade] || {};
        let subjectNames = Object.keys(subjects);
        if(subjectNames.length === 0) { container.innerHTML = '<p style="text-align:center;padding:60px;">🚀 هیچ درسی ثبت نشده، از پنل فرماندهی اضافه کن</p>'; return; }
        let html = '';
        for(let sub of subjectNames) {
            let files = subjects[sub].filter(f => f.type === currentType);
            if(files.length === 0) continue;
            html += `<div class="subject"><div class="subject-title">${sub}</div>`;
            for(let f of files) {
                html += `<div class="file-item">
                    <div><strong>${f.name}</strong> <span class="${f.price==='free'?'free-badge':'paid-badge'}" style="background:${f.price==='free'?'#10b981':'#f59e0b'};padding:4px 12px;border-radius:40px;">${f.price==='free'?'رایگان':'💰 پولی'}</span></div>
                    <div>${f.price==='free' ? `<button class="download-btn" onclick="window.open('${f.link}','_blank')">📥 دانلود</button>` : `<button class="buy-btn" onclick='openBuy(${JSON.stringify(f)},"${sub}")'>🛒 خرید</button>`}</div>
                </div>`;
            }
            html += `</div>`;
        }
        container.innerHTML = html || '<p style="text-align:center;">✨ محتوایی موجود نیست</p>';
    }

    function changeType(t) { currentType = t; renderSubjects(); }
    function backToMain() { document.getElementById('contentPage').classList.add('hidden'); document.getElementById('mainPage').classList.remove('hidden'); document.getElementById('adminPage').classList.add('hidden'); currentGrade = null; }

    function openBuy(file, subject) {
        currentProduct = { ...file, subject };
        document.getElementById('modalInfo').innerHTML = `<p><strong>${file.name}</strong><br>پایه ${currentGrade} - ${subject}<br>کد: <span style="background:#0f172a;padding:4px 12px;border-radius:40px;">${file.code || '----'}</span></p>`;
        document.getElementById('modalBtns').innerHTML = Object.entries(MY_SOCIAL).map(([key,val]) => `<button class="messenger ${key}" style="background:#1e293b;border:1px solid #fbbf24;margin:6px;padding:8px 20px;border-radius:40px;" onclick="sendMsgTo('${key}')">📱 ${val.name}</button>`).join('');
        document.getElementById('modalMsg').classList.add('hidden');
        document.getElementById('modal').style.display = 'flex';
    }
    function sendMsgTo(platform) {
        let social = MY_SOCIAL[platform];
        let msg = `🚀 سفارش از درسیار کیهانی\nپایه: ${currentGrade}\nدرس: ${currentProduct.subject}\nفایل: ${currentProduct.name}\nکد محصول: ${currentProduct.code}\n\nلطفاً فایل را ارسال کنید.\nآیدی من در ${social.name}: ${social.id}\n${social.link}`;
        document.getElementById('modalCode').innerText = msg;
        document.getElementById('modalMsg').classList.remove('hidden');
    }
    function copyCode() { navigator.clipboard.writeText(document.getElementById('modalCode').innerText); showToast('✅ کپی شد'); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function editNotice() { let newNotice = prompt('متن جدید اعلان را وارد کن', noticeText); if(newNotice) { noticeText = newNotice; saveNotice(); if(document.getElementById('noticeDisplay')) document.getElementById('noticeDisplay').innerText = noticeText; showToast('اعلان بروز شد'); } }

    // ---------------- پنل ادمین فوق پیشرفته ----------------
    function showAdmin() {
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('contentPage').classList.add('hidden');
        renderAdmin();
    }

    function renderAdmin() {
        if(!adminLogged) {
            document.getElementById('adminPage').innerHTML = `<div class="admin-box"><h2>🔐 ایستگاه فرماندهی</h2><input type="password" id="adminPass" placeholder="رمز کهکشانی"><button class="btn" onclick="loginAdmin()">ورود</button><button class="btn btn-gray" onclick="backToMain()">بازگشت</button></div>`;
        } else {
            let gradeOpts = `<option value="7">پایه هفتم</option><option value="8">پایه هشتم</option><option value="9">پایه نهم</option>`;
            document.getElementById('adminPage').innerHTML = `<div class="admin-box">
                <h2>🛸 پنل فرماندهی کهکشان درسیار</h2>
                <div class="notice-board">📢 اعلان جاری: <span id="adminNotice">${noticeText}</span> <button class="edit-notice" onclick="editNotice()">✏️ ویرایش</button></div>
                <hr><h3>➕ افزودن درس جدید</h3><select id="newGrade">${gradeOpts}</select><input id="newSubject" placeholder="نام درس"><button class="btn btn-green" onclick="addSubject()">ایجاد درس</button>
                <hr><h3>📄 افزودن فایل</h3><select id="fileGrade" onchange="updateSubSelect()">${gradeOpts}</select><select id="fileSubject"></select><input id="fileName" placeholder="نام فایل"><select id="fileType"><option>جزوه</option><option>نمونه سوال</option><option>کتاب</option></select>
                <select id="filePrice"><option value="free">رایگان</option><option value="paid">پولی</option></select><input id="fileLink" placeholder="لینک (فقط رایگان)"><input id="fileCode" placeholder="کد محصول (پولی)"><button class="btn btn-green" onclick="addFile()">افزودن فایل</button>
                <hr><h3>🗑️ حذف درس یا فایل</h3><select id="delGrade" onchange="updateDelSubject()">${gradeOpts}</select><select id="delSubject"></select><select id="delFileSelect" style="margin-top:5px;"><option value="">حذف فایل خاص (اختیاری)</option></select><button class="btn btn-red" onclick="deleteItem()">حذف انتخاب شده</button>
                <button class="btn btn-gray" style="margin-top:20px;" onclick="backToMain()">🚪 خروج از ایستگاه</button>
            </div>`;
            updateSubSelect(); updateDelSubject();
        }
        document.getElementById('adminPage').classList.remove('hidden');
    }

    function updateSubSelect() {
        let g = document.getElementById('fileGrade').value;
        let subs = Object.keys(DB[g] || {});
        document.getElementById('fileSubject').innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
    }
    async function updateDelSubject() {
        let g = document.getElementById('delGrade').value;
        let subs = Object.keys(DB[g] || {});
        let subSelect = document.getElementById('delSubject');
        subSelect.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
        await updateDelFileList();
    }
    async function updateDelFileList() {
        let grade = document.getElementById('delGrade').value;
        let subject = document.getElementById('delSubject').value;
        let fileSelect = document.getElementById('delFileSelect');
        if(!subject || !DB[grade] || !DB[grade][subject]) { fileSelect.innerHTML = '<option value="">حذف فایل خاص (اختیاری)</option>'; return; }
        let files = DB[grade][subject];
        fileSelect.innerHTML = '<option value="">--- حذف فایل خاص ---</option>' + files.map((f,idx) => `<option value="${idx}">${f.name} (${f.type})</option>`).join('');
    }
    async function deleteItem() {
        let grade = document.getElementById('delGrade').value;
        let subject = document.getElementById('delSubject').value;
        let fileIndex = document.getElementById('delFileSelect').value;
        if(!subject) return showToast('درس را انتخاب کن', true);
        if(fileIndex !== "") {
            if(confirm('فایل مورد نظر حذف شود؟')) {
                DB[grade][subject].splice(parseInt(fileIndex), 1);
                if(DB[grade][subject].length === 0) delete DB[grade][subject];
                await saveData();
                showToast('🗑️ فایل حذف شد');
                renderAdmin();
            }
        } else {
            if(confirm(`آیا درس "${subject}" و تمام فایل‌هایش حذف شود؟`)) {
                delete DB[grade][subject];
                await saveData();
                showToast(`✅ درس ${subject} حذف شد`);
                renderAdmin();
            }
        }
    }

    function loginAdmin() { if(document.getElementById('adminPass').value === 'Admin1403') { adminLogged = true; renderAdmin(); showToast('🚀 به ایستگاه فرماندهی خوش آمدی'); } else showToast('❌ رمز نادرست', true); }
    async function addSubject() { let grade = document.getElementById('newGrade').value, name = document.getElementById('newSubject').value.trim(); if(!name) return; if(!DB[grade]) DB[grade] = {}; if(DB[grade][name]) return showToast('تکراری', true); DB[grade][name] = []; await saveData(); showToast(`✅ درس ${name} اضافه شد`); renderAdmin(); }
    async function addFile() { let grade = document.getElementById('fileGrade').value, subject = document.getElementById('fileSubject').value, name = document.getElementById('fileName').value.trim(), type = document.getElementById('fileType').value, price = document.getElementById('filePrice').value, link = document.getElementById('fileLink').value, code = document.getElementById('fileCode').value; if(!name || !subject) return; if(!DB[grade][subject]) DB[grade][subject] = []; DB[grade][subject].push({ name, type, price, link: price==='free'?link:'', code: price==='paid'?(code||Math.random().toString(36).substr(2,8)):'' }); await saveData(); showToast(`✅ فایل ${name} اضافه شد`); renderAdmin(); }

    function toggleTheme() { document.body.classList.toggle('dark'); if(document.body.classList.contains('dark')) document.body.style.background = '#0a0a1a'; else document.body.style.background = 'radial-gradient(ellipse at bottom, #0d1d31 0%, #0c0d13 100%)'; }

    // ستاره سازی و شهاب سنگ
    function createStars() {
        for(let i=0;i<200;i++) {
            let star = document.createElement('div'); star.classList.add('star');
            let size = Math.random()*3 + 1;
            star.style.width = size+'px'; star.style.height = size+'px';
            star.style.left = Math.random()*100+'%'; star.style.top = Math.random()*100+'%';
            star.style.animationDelay = Math.random()*5+'s'; star.style.animationDuration = (Math.random()*3+1)+'s';
            document.body.appendChild(star);
        }
        for(let i=0;i<6;i++) {
            let meteor = document.createElement('div'); meteor.classList.add('shooting-star');
            meteor.style.top = Math.random()*40+'%'; meteor.style.left = Math.random()*80+'%';
            meteor.style.animationDelay = Math.random()*10+'s'; meteor.style.animationDuration = (Math.random()*3+2)+'s';
            document.body.appendChild(meteor);
        }
    }

    loadNotice(); loadData(); createStars();
</script>
</body>
</html>
