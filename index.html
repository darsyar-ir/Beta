<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درسیار - همیار درسی تو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', 'Tahoma', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            transition: all 0.3s;
        }

        body.dark {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
        }

        body.dark .card,
        body.dark .modal-content,
        body.dark .admin-panel,
        body.dark .content-section {
            background: #1e293b;
            color: #e2e8f0;
            border-color: #475569;
        }

        body.dark .file-item {
            background: #0f172a;
        }

        body.dark .subject {
            border-color: #475569;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .logo span {
            background: #ffd700;
            color: #333;
            padding: 0 10px;
            border-radius: 10px;
        }

        .version {
            font-size: 12px;
            background: rgba(255,255,255,0.3);
            padding: 4px 8px;
            border-radius: 20px;
            margin-right: 10px;
        }

        .theme-btn, .admin-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .theme-btn:hover, .admin-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        .grades {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .grade-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .grade-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .grade-card h2 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .grade-card p {
            color: #666;
        }

        body.dark .grade-card p {
            color: #94a3b8;
        }

        .grade-7 { border-top: 5px solid #3b82f6; }
        .grade-8 { border-top: 5px solid #10b981; }
        .grade-9 { border-top: 5px solid #f59e0b; }

        .content-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 25px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            transition: all 0.3s;
            font-family: inherit;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        body.dark .tab.active {
            background: #764ba2;
        }

        .subjects {
            display: grid;
            gap: 20px;
        }

        .subject {
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            padding: 15px;
            transition: all 0.3s;
        }

        .subject-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #667eea;
        }

        body.dark .subject-title {
            color: #a78bfa;
        }

        .files-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f8fafc;
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
        }

        .file-type {
            font-size: 12px;
            color: #94a3b8;
            margin-right: 10px;
        }

        .price-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .price-free {
            background: #10b981;
            color: white;
        }

        .price-paid {
            background: #f59e0b;
            color: white;
        }

        .download-btn, .buy-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        .download-btn {
            background: #3b82f6;
            color: white;
        }

        .buy-btn {
            background: #f59e0b;
            color: white;
        }

        .download-btn:hover, .buy-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .messengers {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .messenger-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .messenger-btn.bale { background: #00bfa5; color: white; }
        .messenger-btn.eitaa { background: #7c3aed; color: white; }
        .messenger-btn.rubika { background: #dc2626; color: white; }

        .payment-code {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            direction: ltr;
            text-align: left;
            font-size: 12px;
            overflow-x: auto;
        }

        body.dark .payment-code {
            background: #0f172a;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .close-modal {
            margin-top: 15px;
            background: #94a3b8;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
        }

        .admin-login {
            text-align: center;
            padding: 40px;
        }

        .admin-login input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            margin: 10px;
            font-family: inherit;
        }

        .admin-form input, .admin-form select, .admin-form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-family: inherit;
        }

        body.dark .admin-form input,
        body.dark .admin-form select {
            background: #0f172a;
            border-color: #475569;
            color: white;
        }

        .btn {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-success {
            background: #10b981;
        }

        .back-btn {
            background: #94a3b8;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
        }

        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            z-index: 2000;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .grade-card h2 { font-size: 32px; }
            .tab { padding: 8px 15px; font-size: 14px; }
            .file-item { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                📚 درسیار 
                <span>همیار تو</span>
                <span class="version">v1.0</span>
            </div>
            <div>
                <button class="theme-btn" onclick="toggleTheme()">🌙 تغییر تم</button>
                <button class="admin-btn" onclick="showAdmin()">⚙️ پنل ادمین</button>
            </div>
        </div>

        <div id="loadingIndicator" class="loading hidden">
            <div class="spinner"></div>
            <p>در حال بارگذاری...</p>
        </div>

        <div id="gradeSelector">
            <div class="grades">
                <div class="grade-card grade-7" onclick="selectGrade(7)">
                    <h2>پایه هفتم</h2>
                    <p>دوره اول متوسطه</p>
                </div>
                <div class="grade-card grade-8" onclick="selectGrade(8)">
                    <h2>پایه هشتم</h2>
                    <p>دوره اول متوسطه</p>
                </div>
                <div class="grade-card grade-9" onclick="selectGrade(9)">
                    <h2>پایه نهم</h2>
                    <p>دوره اول متوسطه</p>
                </div>
            </div>
        </div>

        <div id="contentArea" class="hidden"></div>
        <div id="adminPanel" class="hidden admin-panel"></div>
    </div>

    <div id="buyModal" class="modal">
        <div class="modal-content">
            <h3>💰 خرید جزوه</h3>
            <div id="modalProductInfo"></div>
            <div class="messengers">
                <button class="messenger-btn bale" onclick="selectMessenger('bale')">بله</button>
                <button class="messenger-btn eitaa" onclick="selectMessenger('eitaa')">ایتا</button>
                <button class="messenger-btn rubika" onclick="selectMessenger('rubika')">روبیکا</button>
            </div>
            <div id="paymentMessage" class="hidden">
                <p>لطفاً این متن رو کپی کنید و به پیوی من در پیامرسان مورد نظر بفرستید:</p>
                <div class="payment-code" id="paymentCode"></div>
                <button class="copy-btn" onclick="copyPaymentCode()">📋 کپی متن</button>
            </div>
            <button class="close-modal" onclick="closeModal()">بستن</button>
        </div>
    </div>

    <script>
        // ==================== تنظیمات ====================
        // دیتای پیشفرض (اولین بار که سایت باز بشه)
        let schoolData = {
            7: { 
                subjects: {
                    "ریاضی": { files: [] },
                    "علوم": { files: [] },
                    "فارسی": { files: [] },
                    "انگلیسی": { files: [] }
                } 
            },
            8: { 
                subjects: {
                    "ریاضی": { files: [] },
                    "علوم": { files: [] },
                    "فارسی": { files: [] },
                    "انگلیسی": { files: [] }
                } 
            },
            9: { 
                subjects: {
                    "ریاضی": { files: [] },
                    "علوم": { files: [] },
                    "فارسی": { files: [] },
                    "انگلیسی": { files: [] }
                } 
            }
        };
        
        let currentGrade = null;
        let currentTab = "جزوه";
        let currentProduct = null;
        let adminLoggedIn = false;
        
        // ==================== ذخیره و بارگذاری در localStorage ====================
        function saveDataToLocal() {
            localStorage.setItem('dresyar_data', JSON.stringify(schoolData));
            showToast('💾 اطلاعات ذخیره شد');
        }
        
        function loadDataFromLocal() {
            const saved = localStorage.getItem('dresyar_data');
            if (saved) {
                schoolData = JSON.parse(saved);
                showToast('✅ اطلاعات بارگذاری شد');
            } else {
                // دیتای پیشفرض رو ذخیره کن
                saveDataToLocal();
            }
        }
        
        // خروجی گرفتن برای آپلود دستی در گیت‌هاب
        function exportToJSON() {
            const dataStr = JSON.stringify(schoolData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dresyar_data.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📁 فایل JSON آماده دانلود شد');
        }
        
        // وارد کردن JSON
        function importFromJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        schoolData = imported;
                        saveDataToLocal();
                        showToast('✅ اطلاعات با موفقیت وارد شد');
                        if (currentGrade) renderSubjects();
                    } catch(err) {
                        showToast('❌ فایل معتبر نیست', true);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        // ==================== توابع کمکی ====================
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
        }
        
        function hideLoading() {
            document.getElementById('loadingIndicator').classList.add('hidden');
        }
        
        // ==================== توابع اصلی ====================
        function selectGrade(grade) {
            currentGrade = grade;
            currentTab = "جزوه";
            document.getElementById('gradeSelector').classList.add('hidden');
            renderContent();
        }
        
        function renderContent() {
            const contentArea = document.getElementById('contentArea');
            
            contentArea.innerHTML = `
                <div class="content-section">
                    <div class="tabs">
                        <button class="tab ${currentTab === 'جزوه' ? 'active' : ''}" onclick="changeTab('جزوه')">📘 جزوه</button>
                        <button class="tab ${currentTab === 'نمونه سوال' ? 'active' : ''}" onclick="changeTab('نمونه سوال')">📝 نمونه سوال</button>
                        <button class="tab ${currentTab === 'کتاب' ? 'active' : ''}" onclick="changeTab('کتاب')">📖 کتاب</button>
                    </div>
                    <div class="subjects" id="subjectsList"></div>
                    <button class="btn back-btn" onclick="backToGrades()">🔙 بازگشت به پایه‌ها</button>
                </div>
            `;
            
            contentArea.classList.remove('hidden');
            renderSubjects();
        }
        
        function renderSubjects() {
            const subjectsList = document.getElementById('subjectsList');
            const gradeData = schoolData[currentGrade];
            
            if (!gradeData || !gradeData.subjects || Object.keys(gradeData.subjects).length === 0) {
                subjectsList.innerHTML = '<p style="text-align:center; padding:40px;">📭 هنوز درسی اضافه نشده است</p>';
                return;
            }
            
            subjectsList.innerHTML = '';
            
            for (const [subjectName, subjectData] of Object.entries(gradeData.subjects)) {
                const filteredFiles = subjectData.files.filter(f => f.type === currentTab);
                
                if (filteredFiles.length === 0) continue;
                
                const subjectDiv = document.createElement('div');
                subjectDiv.className = 'subject';
                subjectDiv.innerHTML = `
                    <div class="subject-title">${escapeHtml(subjectName)}</div>
                    <div class="files-list">
                        ${filteredFiles.map(file => `
                            <div class="file-item">
                                <div class="file-info">
                                    <span class="file-name">${escapeHtml(file.name)}</span>
                                    <span class="file-type">${file.type}</span>
                                </div>
                                <div>
                                    <span class="price-badge ${file.price === 'free' ? 'price-free' : 'price-paid'}">
                                        ${file.price === 'free' ? 'رایگان' : '💰 پولی'}
                                    </span>
                                </div>
                                <div>
                                    ${file.price === 'free' ? 
                                        `<button class="download-btn" onclick="downloadFile('${file.downloadLink}', '${escapeHtml(file.name)}')">📥 دانلود</button>` :
                                        `<button class="buy-btn" onclick="openBuyModal(${JSON.stringify(file).replace(/"/g, '&quot;')}, '${subjectName}')">🛒 خرید</button>`
                                    }
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                subjectsList.appendChild(subjectDiv);
            }
            
            if (subjectsList.innerHTML === '') {
                subjectsList.innerHTML = '<p style="text-align:center; padding:40px;">❌ در این بخش محتوایی وجود ندارد</p>';
            }
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function changeTab(tab) {
            currentTab = tab;
            renderSubjects();
        }
        
        function downloadFile(link, name) {
            if (link && link !== '') {
                window.open(link, '_blank');
            } else {
                showToast('❌ لینک دانلود موجود نیست', true);
            }
        }
        
        function openBuyModal(file, subjectName) {
            currentProduct = { ...file, subjectName };
            document.getElementById('buyModal').style.display = 'flex';
            document.getElementById('modalProductInfo').innerHTML = `
                <p><strong>${file.name}</strong></p>
                <p>درس: ${subjectName} | پایه: ${currentGrade}</p>
                <p>کد محصول: ${file.productCode}</p>
            `;
            document.getElementById('paymentMessage').classList.add('hidden');
        }
        
        function selectMessenger(messenger) {
            const messengerName = { bale: 'بله', eitaa: 'ایتا', rubika: 'روبیکا' }[messenger];
            const message = `📚 سفارش جزوه از درسیار
━━━━━━━━━━━━━━
🎓 پایه: ${currentGrade} ام
📖 درس: ${currentProduct.subjectName}
📄 عنوان: ${currentProduct.name}
🔢 کد محصول: ${currentProduct.productCode}
━━━━━━━━━━━━━━
لطفاً این کد رو برام بفرستید تا فایل رو براتون ارسال کنم.

آیدی من در ${messengerName}: @DresyarAdmin`;
            
            document.getElementById('paymentCode').innerHTML = message;
            document.getElementById('paymentMessage').classList.remove('hidden');
        }
        
        function copyPaymentCode() {
            const code = document.getElementById('paymentCode').innerText;
            navigator.clipboard.writeText(code);
            showToast('✅ متن با موفقیت کپی شد!');
        }
        
        function closeModal() {
            document.getElementById('buyModal').style.display = 'none';
            currentProduct = null;
        }
        
        function backToGrades() {
            document.getElementById('contentArea').classList.add('hidden');
            document.getElementById('gradeSelector').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            currentGrade = null;
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
        }
        
        // ==================== پنل ادمین ====================
        function showAdmin() {
            document.getElementById('gradeSelector').classList.add('hidden');
            document.getElementById('contentArea').classList.add('hidden');
            renderAdmin();
        }
        
        function renderAdmin() {
            const adminPanel = document.getElementById('adminPanel');
            
            if (!adminLoggedIn) {
                adminPanel.innerHTML = `
                    <div class="admin-panel">
                        <div class="admin-login">
                            <h2>🔐 ورود به پنل ادمین</h2>
                            <input type="password" id="adminPass" placeholder="رمز عبور">
                            <button class="btn" onclick="loginAdmin()">ورود</button>
                            <button class="btn back-btn" onclick="backToGrades()">بازگشت</button>
                        </div>
                    </div>
                `;
            } else {
                adminPanel.innerHTML = `
                    <div class="admin-panel">
                        <h2>⚙️ پنل مدیریت درسیار</h2>
                        <p style="color: #10b981;">✅ تمام تغییرات در مرورگر ذخیره می‌شوند</p>
                        <div style="background: #fef3c7; padding: 15px; border-radius: 10px; margin: 15px 0; color: #92400e;">
                            ⚠️ برای انتشار تغییرات در گیت‌هاب، حتماً دکمه Export را بزنید و فایل را در ریپو آپلود کنید
                        </div>
                        <button class="btn" onclick="exportToJSON()">📤 خروجی JSON (برای آپلود در گیت‌هاب)</button>
                        <button class="btn" onclick="importFromJSON()">📥 وارد کردن JSON (بازیابی از فایل)</button>
                        
                        <hr style="margin: 20px 0;">
                        
                        <h3>➕ افزودن درس جدید</h3>
                        <div class="admin-form">
                            <select id="newGrade">
                                <option value="7">پایه هفتم</option>
                                <option value="8">پایه هشتم</option>
                                <option value="9">پایه نهم</option>
                            </select>
                            <input type="text" id="newSubject" placeholder="نام درس (مثلاً ریاضی)">
                            <button class="btn btn-success" onclick="addSubject()">افزودن درس</button>
                        </div>
                        
                        <hr style="margin: 20px 0;">
                        
                        <h3>📄 افزودن فایل جدید</h3>
                        <div class="admin-form">
                            <select id="fileGrade" onchange="updateSubjectList()">
                                <option value="7">پایه هفتم</option>
                                <option value="8">پایه هشتم</option>
                                <option value="9">پایه نهم</option>
                            </select>
                            <select id="fileSubject"></select>
                            <input type="text" id="fileName" placeholder="نام فایل">
                            <select id="fileType">
                                <option value="جزوه">جزوه</option>
                                <option value="نمونه سوال">نمونه سوال</option>
                                <option value="کتاب">کتاب</option>
                            </select>
                            <select id="filePrice">
                                <option value="free">رایگان</option>
                                <option value="paid">پولی</option>
                            </select>
                            <input type="text" id="fileLink" placeholder="لینک دانلود (برای فایل‌های رایگان)">
                            <input type="text" id="productCode" placeholder="کد محصول (برای فایل‌های پولی)">
                            <button class="btn btn-success" onclick="addFile()">➕ افزودن فایل</button>
                        </div>
                        
                        <hr style="margin: 20px 0;">
                        
                        <h3>🗑️ حذف درس</h3>
                        <div class="admin-form">
                            <select id="delGrade" onchange="updateDelSubjectList()">
                                <option value="7">پایه هفتم</option>
                                <option value="8">پایه هشتم</option>
                                <option value="9">پایه نهم</option>
                            </select>
                            <select id="delSubject"></select>
                            <button class="btn btn-danger" onclick="deleteSubject()">🗑️ حذف درس</button>
                        </div>
                        
                        <hr style="margin: 20px 0;">
                        
                        <h3>📋 لیست دروس موجود</h3>
                        <div id="subjectsListAdmin" style="max-height: 300px; overflow-y: auto;"></div>
                        
                        <button class="btn back-btn" onclick="backToGrades()">🔙 بازگشت</button>
                    </div>
                `;
                updateSubjectList();
                updateDelSubjectList();
                renderSubjectsListAdmin();
            }
            
            adminPanel.classList.remove('hidden');
        }
        
        function renderSubjectsListAdmin() {
            const container = document.getElementById('subjectsListAdmin');
            if (!container) return;
            
            let html = '';
            for (let grade of [7,8,9]) {
                html += `<h4>پایه ${grade}</h4><ul>`;
                const subjects = Object.keys(schoolData[grade].subjects || {});
                if (subjects.length === 0) {
                    html += '<li>درسی وجود ندارد</li>';
                } else {
                    subjects.forEach(s => {
                        const fileCount = schoolData[grade].subjects[s].files.length;
                        html += `<li>📖 ${s} (${fileCount} فایل)</li>`;
                    });
                }
                html += '</ul>';
            }
            container.innerHTML = html;
        }
        
        function loginAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === 'Admin1403') {
                adminLoggedIn = true;
                renderAdmin();
                showToast('✅ وارد پنل ادمین شدید');
            } else {
                showToast('❌ رمز عبور اشتباه است!', true);
            }
        }
        
        function updateSubjectList() {
            const grade = document.getElementById('fileGrade').value;
            const subjectSelect = document.getElementById('fileSubject');
            if (subjectSelect && schoolData && schoolData[grade]) {
                const subjects = Object.keys(schoolData[grade].subjects || {});
                subjectSelect.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
                if (subjects.length === 0) {
                    subjectSelect.innerHTML = '<option value="">ابتدا درس اضافه کنید</option>';
                }
            }
        }
        
        function updateDelSubjectList() {
            const grade = document.getElementById('delGrade').value;
            const subjectSelect = document.getElementById('delSubject');
            if (subjectSelect && schoolData && schoolData[grade]) {
                const subjects = Object.keys(schoolData[grade].subjects || {});
                subjectSelect.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
                if (subjects.length === 0) {
                    subjectSelect.innerHTML = '<option value="">درسی وجود ندارد</option>';
                }
            }
        }
        
        function addSubject() {
            const grade = document.getElementById('newGrade').value;
            const subject = document.getElementById('newSubject').value.trim();
            
            if (!subject) {
                showToast('لطفاً نام درس را وارد کنید', true);
                return;
            }
            
            if (!schoolData[grade].subjects) {
                schoolData[grade].subjects = {};
            }
            
            if (schoolData[grade].subjects[subject]) {
                showToast('این درس قبلاً وجود دارد', true);
                return;
            }
            
            schoolData[grade].subjects[subject] = { files: [] };
            saveDataToLocal();
            showToast(`✅ درس "${subject}" با موفقیت اضافه شد`);
            renderAdmin();
        }
        
        function addFile() {
            const grade = document.getElementById('fileGrade').value;
            const subject = document.getElementById('fileSubject').value;
            const name = document.getElementById('fileName').value.trim();
            const type = document.getElementById('fileType').value;
            const price = document.getElementById('filePrice').value;
            const link = document.getElementById('fileLink').value;
            const productCode = document.getElementById('productCode').value;
            
            if (!name || !subject) {
                showToast('لطفاً نام فایل و درس را وارد کنید', true);
                return;
            }
            
            if (!schoolData[grade].subjects[subject]) {
                schoolData[grade].subjects[subject] = { files: [] };
            }
            
            const newFile = {
                name: name,
                type: type,
                price: price,
                downloadLink: price === 'free' ? link : '',
                productCode: price === 'paid' ? (productCode || Math.random().toString(36).substr(2, 8).toUpperCase()) : ''
            };
            
            schoolData[grade].subjects[subject].files.push(newFile);
            saveDataToLocal();
            showToast(`✅ فایل "${name}" با موفقیت اضافه شد`);
            document.getElementById('fileName').value = '';
            document.getElementById('fileLink').value = '';
            document.getElementById('productCode').value = '';
            renderAdmin();
        }
        
        function deleteSubject() {
            const grade = document.getElementById('delGrade').value;
            const subject = document.getElementById('delSubject').value;
            
            if (!subject || !schoolData[grade].subjects[subject]) {
                showToast('درس انتخاب شده معتبر نیست', true);
                return;
            }
            
            if (confirm(`آیا از حذف درس "${subject}" و تمام فایل‌های آن مطمئن هستید؟`)) {
                delete schoolData[grade].subjects[subject];
                saveDataToLocal();
                showToast(`✅ درس "${subject}" حذف شد`);
                renderAdmin();
            }
        }
        
        // بارگذاری اولیه
        loadDataFromLocal();
        
        window.onclick = function(event) {
            const modal = document.getElementById('buyModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
