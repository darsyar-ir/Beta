<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درسیار - سامانه آموزشی</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', system-ui; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; flex-wrap: wrap; }
        .logo { font-size: 32px; font-weight: bold; color: white; }
        .logo span { background: #ffd700; color: #333; padding: 0 10px; border-radius: 10px; }
        button { background: rgba(255,255,255,0.2); border: none; padding: 10px 20px; border-radius: 25px; color: white; cursor: pointer; margin: 5px; }
        .grades { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin: 40px 0; }
        .grade-card { background: white; border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .grade-card:hover { transform: translateY(-10px); }
        .grade-card h2 { font-size: 48px; }
        .grade-7 { border-top: 5px solid #3b82f6; }
        .grade-8 { border-top: 5px solid #10b981; }
        .grade-9 { border-top: 5px solid #f59e0b; }
        .content-section { background: white; border-radius: 20px; padding: 30px; margin-top: 30px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: none; color: #333; border-radius: 10px 10px 0 0; }
        .tab.active { background: #667eea; color: white; }
        .subject { border: 1px solid #ddd; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .subject-title { font-size: 22px; font-weight: bold; color: #667eea; margin-bottom: 15px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f5f5f5; border-radius: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .price-free { background: #10b981; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .price-paid { background: #f59e0b; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .download-btn, .buy-btn { padding: 6px 15px; border: none; border-radius: 20px; cursor: pointer; }
        .download-btn { background: #3b82f6; color: white; }
        .buy-btn { background: #f59e0b; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; max-width: 500px; width: 90%; text-align: center; }
        .messenger-btn { padding: 10px 20px; margin: 5px; border: none; border-radius: 10px; cursor: pointer; color: white; }
        .bale { background: #00bfa5; }
        .eitaa { background: #7c3aed; }
        .rubika { background: #dc2626; }
        .payment-code { background: #f0f0f0; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; font-size: 12px; white-space: pre-wrap; }
        .admin-panel { background: white; border-radius: 20px; padding: 30px; margin-top: 30px; }
        .admin-login { text-align: center; padding: 40px; }
        .admin-login input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 10px; margin: 10px; }
        .admin-form input, .admin-form select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; }
        .btn { background: #667eea; color: white; padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; margin: 5px; }
        .btn-success { background: #10b981; }
        .btn-danger { background: #ef4444; }
        .back-btn { background: #94a3b8; }
        .hidden { display: none; }
        .loading { text-align: center; padding: 50px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 10px; z-index: 2000; animation: fadeOut 3s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @media (max-width: 768px) { .file-item { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📚 درسیار <span>همیار تو</span></div>
            <div>
                <button onclick="toggleTheme()">🌙 تغییر تم</button>
                <button onclick="showAdmin()">⚙️ پنل ادمین</button>
            </div>
        </div>

        <div id="loadingIndicator" class="loading hidden"><div class="spinner"></div><p>در حال بارگذاری...</p></div>
        <div id="gradeSelector"><div class="grades" id="gradesList"></div></div>
        <div id="contentArea" class="hidden"></div>
        <div id="adminPanel" class="hidden admin-panel"></div>
    </div>

    <div id="buyModal" class="modal"><div class="modal-content"><h3>💰 خرید</h3><div id="modalProductInfo"></div><div class="messengers" id="messengersList"></div><div id="paymentMessage" class="hidden"><p>متن زیر رو کپی کن و برام بفرست:</p><div class="payment-code" id="paymentCode"></div><button class="btn" onclick="copyPaymentCode()">📋 کپی</button></div><button class="btn back-btn" onclick="closeModal()">بستن</button></div></div>

    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/darsyar-ir/Beta/main/dresyar_data.json';
        let schoolData = null, currentGrade = null, currentTab = "جزوه", currentProduct = null, adminLoggedIn = false;

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function loadData() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            try {
                const res = await fetch(DATA_URL + '?t=' + Date.now());
                if (res.ok) schoolData = await res.json();
                else throw new Error();
                showToast('✅ اطلاعات بارگذاری شد');
            } catch(e) {
                schoolData = {7:{subjects:{}},8:{subjects:{}},9:{subjects:{}}};
                showToast('⚠️ از دیتای پیشفرض استفاده شد', true);
            }
            document.getElementById('loadingIndicator').classList.add('hidden');
            renderGrades();
        }

        function renderGrades() {
            const grades = [7,8,9];
            const names = {7:'هفتم',8:'هشتم',9:'نهم'};
            const colors = {7:'#3b82f6',8:'#10b981',9:'#f59e0b'};
            document.getElementById('gradesList').innerHTML = grades.map(g => `
                <div class="grade-card grade-${g}" style="border-top-color:${colors[g]}" onclick="selectGrade(${g})">
                    <h2>پایه ${names[g]}</h2>
                    <p>دوره اول متوسطه</p>
                </div>
            `).join('');
        }

        function selectGrade(grade) {
            currentGrade = grade;
            currentTab = "جزوه";
            document.getElementById('gradeSelector').classList.add('hidden');
            renderContent();
        }

        function renderContent() {
            document.getElementById('contentArea').innerHTML = `
                <div class="content-section">
                    <div class="tabs">
                        ${['جزوه','نمونه سوال','کتاب'].map(t => `<button class="tab ${currentTab===t?'active':''}" onclick="changeTab('${t}')">${t==='جزوه'?'📘':t==='نمونه سوال'?'📝':'📖'} ${t}</button>`).join('')}
                    </div>
                    <div id="subjectsList"></div>
                    <button class="btn back-btn" onclick="backToGrades()">🔙 بازگشت</button>
                </div>
            `;
            document.getElementById('contentArea').classList.remove('hidden');
            renderSubjects();
        }

        function renderSubjects() {
            const container = document.getElementById('subjectsList');
            const gradeData = schoolData[currentGrade];
            if (!gradeData?.subjects || Object.keys(gradeData.subjects).length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:40px;">📭 درسی اضافه نشده</p>';
                return;
            }
            let html = '';
            for (const [subject, data] of Object.entries(gradeData.subjects)) {
                const files = data.files.filter(f => f.type === currentTab);
                if (files.length === 0) continue;
                html += `<div class="subject"><div class="subject-title">${subject}</div>`;
                files.forEach(f => {
                    html += `<div class="file-item">
                        <div><strong>${f.name}</strong></div>
                        <div><span class="${f.price==='free'?'price-free':'price-paid'}">${f.price==='free'?'رایگان':'💰 پولی'}</span></div>
                        <div>${f.price==='free' ? `<button class="download-btn" onclick="window.open('${f.downloadLink}','_blank')">📥 دانلود</button>` : `<button class="buy-btn" onclick='openBuyModal(${JSON.stringify(f)},"${subject}")'>🛒 خرید</button>`}</div>
                    </div>`;
                });
                html += `</div>`;
            }
            container.innerHTML = html || '<p style="text-align:center;padding:40px;">❌ محتوایی نیست</p>';
        }

        function changeTab(tab) { currentTab = tab; renderSubjects(); }
        function backToGrades() { document.getElementById('contentArea').classList.add('hidden'); document.getElementById('gradeSelector').classList.remove('hidden'); document.getElementById('adminPanel').classList.add('hidden'); currentGrade = null; }
        function toggleTheme() { document.body.classList.toggle('dark'); }

        function openBuyModal(file, subject) {
            currentProduct = { ...file, subject };
            document.getElementById('modalProductInfo').innerHTML = `<p><strong>${file.name}</strong><br>پایه ${currentGrade} - ${subject}<br>کد: ${file.productCode}</p>`;
            document.getElementById('messengersList').innerHTML = `
                <button class="messenger-btn bale" onclick="selectMessenger('بله')">بله</button>
                <button class="messenger-btn eitaa" onclick="selectMessenger('ایتا')">ایتا</button>
                <button class="messenger-btn rubika" onclick="selectMessenger('روبیکا')">روبیکا</button>
            `;
            document.getElementById('paymentMessage').classList.add('hidden');
            document.getElementById('buyModal').style.display = 'flex';
        }

        function selectMessenger(messenger) {
            const msg = `📚 سفارش از درسیار\nپایه: ${currentGrade}\nدرس: ${currentProduct.subject}\nفایل: ${currentProduct.name}\nکد محصول: ${currentProduct.productCode}\n\nآیدی من در ${messenger}: @DresyarAdmin`;
            document.getElementById('paymentCode').innerHTML = msg;
            document.getElementById('paymentMessage').classList.remove('hidden');
        }

        function copyPaymentCode() { navigator.clipboard.writeText(document.getElementById('paymentCode').innerText); showToast('✅ کپی شد'); }
        function closeModal() { document.getElementById('buyModal').style.display = 'none'; }

        function showAdmin() {
            document.getElementById('gradeSelector').classList.add('hidden');
            document.getElementById('contentArea').classList.add('hidden');
            renderAdmin();
        }

        function renderAdmin() {
            const panel = document.getElementById('adminPanel');
            if (!adminLoggedIn) {
                panel.innerHTML = `<div class="admin-panel"><div class="admin-login"><h2>🔐 ورود ادمین</h2><input type="password" id="adminPass" placeholder="رمز"><button class="btn" onclick="loginAdmin()">ورود</button><button class="btn back-btn" onclick="backToGrades()">بازگشت</button></div></div>`;
            } else {
                panel.innerHTML = `<div class="admin-panel">
                    <h2>⚙️ پنل مدیریت</h2>
                    <div style="background:#fef3c7;padding:15px;border-radius:10px;margin:15px 0;color:#92400e;">
                        ⚠️ بعد از هر تغییر، فایل رو دانلود کن و توی گیت‌هاب آپلود کن
                    </div>
                    <button class="btn btn-success" onclick="downloadData()">📥 دانلود JSON (برای آپلود)</button>
                    <hr>
                    <h3>➕ درس جدید</h3>
                    <select id="newGrade"><option value="7">پایه7</option><option value="8">پایه8</option><option value="9">پایه9</option></select>
                    <input id="newSubject" placeholder="نام درس">
                    <button class="btn" onclick="addSubject()">افزودن</button>
                    <hr>
                    <h3>📄 فایل جدید</h3>
                    <select id="fileGrade" onchange="updateSubjectsList()"><option value="7">پایه7</option><option value="8">پایه8</option><option value="9">پایه9</option></select>
                    <select id="fileSubject"></select>
                    <input id="fileName" placeholder="نام فایل">
                    <select id="fileType"><option>جزوه</option><option>نمونه سوال</option><option>کتاب</option></select>
                    <select id="filePrice"><option value="free">رایگان</option><option value="paid">پولی</option></select>
                    <input id="fileLink" placeholder="لینک دانلود (برای رایگان)">
                    <input id="productCode" placeholder="کد محصول (برای پولی)">
                    <button class="btn" onclick="addFile()">افزودن فایل</button>
                    <hr>
                    <h3>🗑️ حذف درس</h3>
                    <select id="delGrade" onchange="updateDelList()"><option value="7">پایه7</option><option value="8">پایه8</option><option value="9">پایه9</option></select>
                    <select id="delSubject"></select>
                    <button class="btn btn-danger" onclick="deleteSubject()">حذف درس</button>
                    <button class="btn back-btn" onclick="backToGrades()">بازگشت</button>
                </div>`;
                updateSubjectsList();
                updateDelList();
            }
            panel.classList.remove('hidden');
        }

        function loginAdmin() {
            if (document.getElementById('adminPass').value === 'Admin1403') {
                adminLoggedIn = true;
                renderAdmin();
                showToast('✅ وارد شدید');
            } else showToast('❌ رمز اشتباه', true);
        }

        function updateSubjectsList() {
            const g = document.getElementById('fileGrade').value;
            const sel = document.getElementById('fileSubject');
            if (schoolData[g]?.subjects) sel.innerHTML = Object.keys(schoolData[g].subjects).map(s => `<option>${s}</option>`).join('');
        }

        function updateDelList() {
            const g = document.getElementById('delGrade').value;
            const sel = document.getElementById('delSubject');
            if (schoolData[g]?.subjects) sel.innerHTML = Object.keys(schoolData[g].subjects).map(s => `<option>${s}</option>`).join('');
        }

        function addSubject() {
            const grade = document.getElementById('newGrade').value;
            const name = document.getElementById('newSubject').value.trim();
            if (!name) return showToast('نام درس را وارد کن', true);
            if (!schoolData[grade].subjects) schoolData[grade].subjects = {};
            if (schoolData[grade].subjects[name]) return showToast('درس تکراری', true);
            schoolData[grade].subjects[name] = { files: [] };
            showToast(`✅ درس ${name} اضافه شد. حالا دکمه Download رو بزن و توی گیت‌هاب آپلود کن`);
            renderAdmin();
        }

        function addFile() {
            const grade = document.getElementById('fileGrade').value;
            const subject = document.getElementById('fileSubject').value;
            const name = document.getElementById('fileName').value.trim();
            const type = document.getElementById('fileType').value;
            const price = document.getElementById('filePrice').value;
            const link = document.getElementById('fileLink').value;
            const code = document.getElementById('productCode').value;
            if (!name || !subject) return showToast('نام فایل و درس را وارد کن', true);
            if (!schoolData[grade].subjects[subject]) schoolData[grade].subjects[subject] = { files: [] };
            schoolData[grade].subjects[subject].files.push({
                name, type, price,
                downloadLink: price === 'free' ? link : '',
                productCode: price === 'paid' ? (code || Math.random().toString(36).substr(2,6).toUpperCase()) : ''
            });
            showToast(`✅ فایل اضافه شد. حالا دکمه Download رو بزن و توی گیت‌هاب آپلود کن`);
            renderAdmin();
        }

        function deleteSubject() {
            const grade = document.getElementById('delGrade').value;
            const subject = document.getElementById('delSubject').value;
            if (!subject) return showToast('درسی انتخاب کن', true);
            if (confirm(`حذف "${subject}"؟`)) {
                delete schoolData[grade].subjects[subject];
                showToast(`✅ حذف شد. دکمه Download رو بزن و آپلود کن`);
                renderAdmin();
            }
        }

        function downloadData() {
            const dataStr = JSON.stringify(schoolData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dresyar_data.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📁 فایل دانلود شد، حالا برو گیت‌هاب و آپلودش کن');
        }

        loadData();
    </script>
</body>
</html>
