<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>درسیار | نسخه ۰.۷.۱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 16px;
            color: #0f172a;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scalePop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .container { max-width: 1300px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 80px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.9);
        }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #1e3a8a, #0d9488); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo span { font-size: 12px; background: none; color: #64748b; }
        .nav-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        button {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            color: #1e3a8a;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        button:active { transform: scale(0.96); background: #eef2ff; }
        .blog-btn { background: #0d9488; color: white; box-shadow: 0 4px 10px rgba(13,148,136,0.3); }
        .admin-btn { background: #1e3a8a; color: white; }

        .grades { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 32px 0; }
        .grade-card {
            background: white;
            border-radius: 48px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            width: 170px;
            transition: 0.25s;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .grade-card:hover { transform: translateY(-8px); box-shadow: 0 30px 40px -12px rgba(0,0,0,0.15); }
        .grade-card h2 { font-size: 40px; font-weight: 800; margin-bottom: 6px; }
        .grade-7 { background: linear-gradient(145deg, #ffffff, #f0f9ff); border-bottom: 5px solid #2563eb; }
        .grade-8 { background: linear-gradient(145deg, #ffffff, #f0fdfa); border-bottom: 5px solid #0d9488; }
        .grade-9 { background: linear-gradient(145deg, #ffffff, #f0f9ff); border-bottom: 5px solid #1e3a8a; }

        .panel, .admin-box, .modal-content, .blog-page {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            animation: scalePop 0.3s ease;
        }
        .tabs { display: flex; gap: 12px; border-bottom: 2px solid #e2e8f0; margin-bottom: 24px; flex-wrap: wrap; }
        .tab { background: transparent; box-shadow: none; color: #475569; font-weight: 600; padding: 8px 20px; }
        .tab.active { background: #1e3a8a; color: white; box-shadow: 0 6px 14px rgba(30,58,138,0.2); }

        .subject { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; box-shadow: 0 6px 14px rgba(0,0,0,0.03); border: 1px solid #eef2ff; }
        .subject-title { font-size: 1.6rem; font-weight: 800; color: #0d9488; margin-bottom: 16px; border-right: 5px solid #0d9488; padding-right: 16px; }
        .file-item { background: #f8fafc; border-radius: 28px; padding: 14px 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .free-badge { background: #10b981; color: white; padding: 4px 14px; border-radius: 40px; font-size: 12px; font-weight: bold; }
        .paid-badge { background: #f59e0b; color: white; padding: 4px 14px; border-radius: 40px; font-size: 12px; font-weight: bold; }

        .rating { display: flex; direction: ltr; gap: 6px; margin: 12px 0 8px; align-items: center; }
        .star { font-size: 24px; cursor: pointer; color: #cbd5e1; transition: 0.1s; }
        .star.active, .star:hover { color: #fbbf24; text-shadow: 0 0 5px #fbbf24; }
        .avg-rating { font-size: 13px; font-weight: 500; color: #1e3a8a; margin-right: 12px; }

        .comments-section { margin-top: 18px; padding-top: 12px; border-top: 1px solid #e2e8f0; }
        .comment { background: #f1f5f9; border-radius: 24px; padding: 10px 16px; margin-bottom: 10px; }
        .comment-user { font-weight: 800; color: #0d9488; }
        .add-comment { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
        .add-comment input { flex: 1; padding: 12px 18px; border-radius: 60px; border: 1px solid #cbd5e1; background: white; font-size: 14px; }

        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 24px; margin-top: 20px; }
        .blog-card { background: white; border-radius: 36px; padding: 20px; transition: 0.2s; border: 1px solid #e2e8f0; }
        .blog-card h3 { color: #1e3a8a; margin-bottom: 8px; font-size: 1.3rem; }

        .notice-board { background: #eef2ff; border-right: 6px solid #0d9488; padding: 14px 20px; border-radius: 40px; margin-bottom: 28px; font-weight: 500; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        input, select, textarea { width: 100%; padding: 12px 18px; margin: 8px 0; border-radius: 60px; border: 1px solid #cbd5e1; background: white; font-family: inherit; }
        .btn { background: #1e3a8a; color: white; border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; margin: 6px; }
        .btn-green { background: #0d9488; }
        .btn-red { background: #ef4444; }
        .btn-warning { background: #f59e0b; color: black; }
        .hidden { display: none; }
        .toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 24px; border-radius: 60px; z-index: 2100; animation: fadeOut 2.5s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        footer { text-align: center; margin-top: 40px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">✨ درسیار <span>نسخه ۰.۷.۱</span></div>
        <div class="nav-buttons">
            <button onclick="showMainPage()">🏠 خانه</button>
            <button class="blog-btn" onclick="showBlog()">📝 وبلاگ</button>
            <button class="admin-btn" onclick="showAdmin()">⚡ ادمین</button>
        </div>
    </div>

    <div id="mainPage"><div class="grades" id="gradesList"></div></div>
    <div id="contentPage" class="hidden"></div>
    <div id="blogPage" class="hidden"></div>
    <div id="adminPage" class="hidden"></div>
    <footer>© ۱۴۰۵ - درسیار | تمامی حقوق محفوظ است</footer>
</div>

<div id="modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); justify-content:center; align-items:center; z-index:2000;"><div class="modal-content" style="max-width:400px;"><h3>💎 تکمیل خرید</h3><div id="modalInfo"></div><div id="modalBtns"></div><div id="modalMsg" class="hidden"><div id="modalCode" style="background:#f1f5f9; padding:12px; border-radius:24px; margin:12px 0;"></div><button class="btn" onclick="copyCode()">📋 کپی</button></div><button class="btn" onclick="closeModal()">بستن</button></div></div>

<script>
    // =============== متغیرهای قابل تغییر توسط ادمین ===============
    let BIN_ID = localStorage.getItem("custom_bin_id") || "6a2e83cff5f4af5e29efa0ec";
    let API_KEY = localStorage.getItem("custom_api_key") || "$2a$10$QiD9l/D7m8hTGNnFASLf2.n5VZe6yAIUolrrbDKirrpteGeBDGcwC";
    // ===========================================================

    let admins = ["Admin1403"];
    let DB = null;
    let currentGrade = null, currentType = 'جزوه', currentProduct = null, adminLogged = false;
    let noticeText = "🌟 به درسیار خوش آمدی! بهترین جزوات، نمونه سوالات و کتاب‌ها اینجاست.";
    let blogPosts = [];

    const MY_SOCIAL = { bale:{ name:"بله", id:"@Arian_A_Game" }, eitaa:{ name:"ایتا", id:"@Arian_A_Game" }, rubika:{ name:"روبیکا", id:"@Arian_A_Gane" } };

    function showToast(msg, isErr) { let t = document.createElement('div'); t.className = 'toast'; t.style.background = isErr ? '#ef4444' : '#0d9488'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

    async function loadData() {
        try {
            let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            if (!res.ok) throw new Error();
            let data = await res.json();
            DB = data.record;
            if (!DB["7"]) DB = { "7":{}, "8":{}, "9":{}, notice:noticeText, admins:admins, ratings:{}, comments:{}, blogPosts:[] };
            if(DB.notice) noticeText = DB.notice;
            if(DB.admins) admins = DB.admins;
            if(!DB.ratings) DB.ratings = {};
            if(!DB.comments) DB.comments = {};
            blogPosts = DB.blogPosts || [];
            showToast('✅ درسیار آماده‌ست');
        } catch(e) {
            DB = { "7":{}, "8":{}, "9":{}, notice:noticeText, admins:admins, ratings:{}, comments:{}, blogPosts:[] };
            showToast('⚠️ حالت آفلاین', true);
        }
        showGrades();
    }

    async function saveData() {
        if (!adminLogged) return false;
        DB.notice = noticeText;
        DB.admins = admins;
        DB.blogPosts = blogPosts;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type':'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(DB)
            });
            showToast('💾 ذخیره شد');
            return true;
        } catch(e) { showToast('❌ خطا در ذخیره', true); return false; }
    }

    function showGrades() { let grades = [7,8,9]; document.getElementById('gradesList').innerHTML = grades.map(g => `<div class="grade-card grade-${g}" onclick="selectGrade(${g})"><h2>پایه ${g}</h2><p>دوره اول</p></div>`).join(''); }
    function selectGrade(g) { currentGrade = g; currentType = 'جزوه'; document.getElementById('mainPage').classList.add('hidden'); renderContent(); }
    function showMainPage() { document.getElementById('mainPage').classList.remove('hidden'); document.getElementById('contentPage').classList.add('hidden'); document.getElementById('blogPage').classList.add('hidden'); document.getElementById('adminPage').classList.add('hidden'); currentGrade = null; showGrades(); }
    function showBlog() { document.getElementById('mainPage').classList.add('hidden'); document.getElementById('contentPage').classList.add('hidden'); document.getElementById('adminPage').classList.add('hidden'); renderBlogPage(); }
    function renderBlogPage() { let html = `<div class="blog-page"><div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;"><h2 style="color:#1e3a8a;">📝 وبلاگ درسیار</h2>${adminLogged ? '<button class="btn btn-green" onclick="addNewPost()">➕ پست جدید</button>' : ''}</div><div class="blog-grid" id="blogGrid"></div></div>`; document.getElementById('blogPage').innerHTML = html; document.getElementById('blogPage').classList.remove('hidden'); renderBlogPosts(); }
    function renderBlogPosts() { let container = document.getElementById('blogGrid'); if(!container) return; if(blogPosts.length===0) { container.innerHTML = '<p style="text-align:center;padding:40px;">📭 پستی وجود ندارد.</p>'; return; } container.innerHTML = blogPosts.map((p,idx)=>`<div class="blog-card"><h3>${p.title}</h3><p>${p.summary}</p><span class="blog-date">📅 ${p.date}</span>${adminLogged ? `<div style="margin-top:14px; display:flex; gap:8px;"><button class="btn-warning" style="padding:5px 12px;" onclick="editPost(${idx})">✏️ ویرایش</button><button class="btn-red" style="padding:5px 12px;" onclick="deletePost(${idx})">🗑️ حذف</button></div>` : ''}<button class="btn-sm" style="margin-top:12px; background:#eef2ff; border:none; padding:6px 16px; border-radius:60px;" onclick="viewPost(${idx})">مطالعه بیشتر</button></div>`).join(''); }
    function viewPost(idx) { let p = blogPosts[idx]; if(p) alert(`${p.title}\n\n${p.content}\n\n📅 ${p.date}`); }
    function addNewPost() { let title = prompt('عنوان پست:'); if(!title) return; let summary = prompt('خلاصه:'); let content = prompt('متن کامل:'); blogPosts.push({ title, summary, content, date: new Date().toLocaleDateString('fa-IR') }); if(adminLogged) saveData(); renderBlogPage(); showToast('پست اضافه شد'); }
    function editPost(idx) { let p = blogPosts[idx]; let newTitle = prompt('عنوان جدید:', p.title); if(newTitle) p.title = newTitle; let newSummary = prompt('خلاصه جدید:', p.summary); if(newSummary) p.summary = newSummary; let newContent = prompt('متن جدید:', p.content); if(newContent) p.content = newContent; p.date = new Date().toLocaleDateString('fa-IR'); if(adminLogged) saveData(); renderBlogPage(); showToast('پست ویرایش شد'); }
    function deletePost(idx) { if(confirm('پست حذف شود؟')) { blogPosts.splice(idx,1); if(adminLogged) saveData(); renderBlogPage(); showToast('پست حذف شد'); } }

    function renderContent() { let html = `<div class="panel"><div class="notice-board">📢 <span id="noticeSpan">${noticeText}</span>${adminLogged ? '<button class="btn-warning btn-sm" onclick="editNotice()">✏️</button>' : ''}</div><div class="tabs">${['جزوه','نمونه سوال','کتاب'].map(t => `<button class="tab ${currentType===t?'active':''}" onclick="changeType('${t}')">${t==='جزوه'?'📘':t==='نمونه سوال'?'📝':'📖'} ${t}</button>`).join('')}</div><div id="subjectsDiv"></div><button class="btn" onclick="showMainPage()">🔙 بازگشت</button></div>`; document.getElementById('contentPage').innerHTML = html; document.getElementById('contentPage').classList.remove('hidden'); renderSubjects(); }
    function renderSubjects() { let container = document.getElementById('subjectsDiv'); let subjects = DB[currentGrade] || {}; let subjectNames = Object.keys(subjects); if(subjectNames.length === 0) { container.innerHTML = '<p style="text-align:center;padding:50px;">🚀 درسی ثبت نشده</p>'; return; } let html = ''; for(let sub of subjectNames) { let files = subjects[sub].filter(f => f.type === currentType); if(files.length === 0) continue; html += `<div class="subject"><div class="subject-title">${sub}</div>`; for(let idx in files) { let f = files[idx]; let fileId = `${currentGrade}_${sub}_${currentType}_${idx}`; let ratings = DB.ratings[fileId] || { avg:0, count:0, users:{} }; let avgStars = ratings.avg; let comments = DB.comments[fileId] || []; html += `<div class="file-item"><div><strong>${f.name}</strong> <span class="${f.price==='free'?'free-badge':'paid-badge'}">${f.price==='free'?'رایگان':'💰 پولی'}</span></div><div>${f.price==='free' ? `<button class="btn-sm" style="background:#0d9488; color:white; border:none; padding:6px 18px; border-radius:40px;" onclick="window.open('${f.link}','_blank')">📥 دانلود</button>` : `<button class="btn-sm" style="background:#f59e0b; color:black; border:none; padding:6px 18px; border-radius:40px;" onclick='openBuy(${JSON.stringify(f)},"${sub}")'>🛒 خرید</button>`}</div></div><div class="rating">${[1,2,3,4,5].map(s => `<span class="star ${s <= avgStars ? 'active' : ''}" onclick="rateFile('${fileId}', ${s})">★</span>`).join('')}<span class="avg-rating">(${avgStars.toFixed(1)} - ${ratings.count})</span></div><div class="comments-section"><div>${comments.map(c => `<div class="comment"><span class="comment-user">${c.user}:</span> ${c.text}<div class="comment-date">${c.date}</div></div>`).join('')}</div><div class="add-comment"><input id="com-${fileId}" placeholder="نظر خود را بنویس..."><button class="btn-sm" style="background:#1e3a8a; color:white; border:none; padding:6px 18px; border-radius:40px;" onclick="addComment('${fileId}')">ارسال</button></div></div>`; } html += `</div>`; } container.innerHTML = html; }
    function changeType(t) { currentType = t; renderSubjects(); }
    function getUserIP() { return localStorage.getItem('user_id') || (() => { let id = 'user_'+Math.random().toString(36).substr(2,8); localStorage.setItem('user_id',id); return id; })(); }
    async function rateFile(fileId, rating) { if(!DB.ratings[fileId]) DB.ratings[fileId] = { avg:0, count:0, users:{} }; let uid = getUserIP(); if(DB.ratings[fileId].users[uid]) { showToast('قبلاً امتیاز دادی', true); return; } DB.ratings[fileId].users[uid] = rating; let total = Object.values(DB.ratings[fileId].users).reduce((a,b)=>a+b,0); let cnt = Object.keys(DB.ratings[fileId].users).length; DB.ratings[fileId].avg = total/cnt; DB.ratings[fileId].count = cnt; if(adminLogged) await saveData(); renderSubjects(); showToast(`⭐ امتیاز ${rating} ثبت شد`); }
    async function addComment(fileId) { let input = document.getElementById(`com-${fileId}`); let text = input.value.trim(); if(!text) return; let uid = getUserIP(); if(!DB.comments[fileId]) DB.comments[fileId] = []; DB.comments[fileId].push({ user: uid.slice(0,7), text, date: new Date().toLocaleDateString('fa-IR') }); if(adminLogged) await saveData(); input.value = ''; renderSubjects(); showToast('نظر ثبت شد'); }
    function openBuy(file, subject) { currentProduct = { ...file, subject }; document.getElementById('modalInfo').innerHTML = `<p><strong>${file.name}</strong><br>پایه ${currentGrade} - ${subject}<br>کد: ${file.code || '----'}</p>`; document.getElementById('modalBtns').innerHTML = Object.entries(MY_SOCIAL).map(([k,v]) => `<button style="background:#1e3a8a; color:white; margin:5px; padding:8px 20px; border-radius:60px;" onclick="sendMsgTo('${k}')">📱 ${v.name}</button>`).join(''); document.getElementById('modalMsg').classList.add('hidden'); document.getElementById('modal').style.display = 'flex'; }
    function sendMsgTo(p) { let social = MY_SOCIAL[p]; let msg = `🚀 سفارش درسیار\nپایه: ${currentGrade}\nدرس: ${currentProduct.subject}\nفایل: ${currentProduct.name}\nکد: ${currentProduct.code}\nآیدی من در ${social.name}: ${social.id}`; document.getElementById('modalCode').innerText = msg; document.getElementById('modalMsg').classList.remove('hidden'); }
    function copyCode() { navigator.clipboard.writeText(document.getElementById('modalCode').innerText); showToast('✅ کپی شد'); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    async function editNotice() { let n = prompt('متن اعلان جدید:', noticeText); if(n && n.trim()) { noticeText = n.trim(); if(adminLogged) await saveData(); let span = document.getElementById('noticeSpan'); if(span) span.innerText = noticeText; showToast('اعلان بروز شد'); } }

    // =============== پنل ادمین با قابلیت تغییر BIN_ID و API_KEY ===============
    function showAdmin() { document.getElementById('mainPage').classList.add('hidden'); document.getElementById('contentPage').classList.add('hidden'); document.getElementById('blogPage').classList.add('hidden'); renderAdmin(); }
    function renderAdmin() { if(!adminLogged) { document.getElementById('adminPage').innerHTML = `<div class="admin-box"><h2>🔐 ورود به پنل</h2><input id="adminPass" type="password" placeholder="رمز"><button class="btn" onclick="loginAdmin()">ورود</button><button class="btn" onclick="showMainPage()">بازگشت</button></div>`; } else { let gradeOpts = `<option value="7">پایه7</option><option value="8">پایه8</option><option value="9">پایه9</option>`; let adminsList = admins.map(a => `<li>${a} <button class="btn-red btn-sm" onclick="removeAdmin('${a}')">حذف</button></li>`).join(''); document.getElementById('adminPage').innerHTML = `<div class="admin-box"><h2>🛸 پنل جامع درسیار ۰.۷.۱</h2><div class="notice-board">📢 اعلان: ${noticeText}<button class="btn-warning btn-sm" onclick="editNotice()">✏️</button></div><hr><h3>⚙️ تنظیمات JSONBin</h3><input id="newBinId" placeholder="BIN ID جدید" value="${BIN_ID}"><input id="newApiKey" placeholder="API KEY جدید" value="${API_KEY}"><button class="btn-warning btn-sm" onclick="updateJsonbinSettings()">💾 تغییر و ذخیره</button><hr><h3>👥 ادمین‌ها</h3><input id="newAdminPass" placeholder="رمز جدید"><button class="btn-green btn-sm" onclick="addAdmin()">➕ افزودن</button><ul>${adminsList}</ul><hr><h3>➕ درس جدید</h3><select id="newGrade">${gradeOpts}</select><input id="newSubject" placeholder="نام درس"><button class="btn-green btn-sm" onclick="addSubject()">ایجاد</button><hr><h3>📄 فایل جدید</h3><select id="fileGrade" onchange="updateSubSelect()">${gradeOpts}</select><select id="fileSubject"></select><input id="fileName" placeholder="نام فایل"><select id="fileType"><option>جزوه</option><option>نمونه سوال</option><option>کتاب</option></select><select id="filePrice"><option value="free">رایگان</option><option value="paid">پولی</option></select><input id="fileLink" placeholder="لینک (رایگان)"><input id="fileCode" placeholder="کد (پولی)"><button class="btn-green btn-sm" onclick="addFile()">افزودن</button><hr><h3>🗑️ حذف</h3><select id="delGrade" onchange="updateDelSubject()">${gradeOpts}</select><select id="delSubject"></select><select id="delFileSelect"><option value="">حذف فایل خاص</option></select><button class="btn-red btn-sm" onclick="deleteItem()">حذف</button><button class="btn" onclick="showMainPage()">🚪 خروج</button></div>`; updateSubSelect(); updateDelSubject(); } document.getElementById('adminPage').classList.remove('hidden'); }
    function loginAdmin() { let pass = document.getElementById('adminPass').value; if(admins.includes(pass)) { adminLogged = true; renderAdmin(); showToast('🚀 وارد شدی'); } else showToast('❌ رمز نادرست', true); }
    async function updateJsonbinSettings() { let newBin = document.getElementById('newBinId').value.trim(); let newKey = document.getElementById('newApiKey').value.trim(); if(newBin) { localStorage.setItem('custom_bin_id', newBin); BIN_ID = newBin; } if(newKey) { localStorage.setItem('custom_api_key', newKey); API_KEY = newKey; } showToast('تنظیمات بروز شد، صفحه دوباره بارگذاری میشود'); setTimeout(() => location.reload(), 1500); }
    async function addAdmin() { let p = document.getElementById('newAdminPass').value.trim(); if(p && !admins.includes(p)) { admins.push(p); await saveData(); renderAdmin(); } }
    async function removeAdmin(p) { if(p==='Admin1403') { showToast('ادمین اصلی قابل حذف نیست', true); return; } admins = admins.filter(a=>a!==p); await saveData(); renderAdmin(); }
    function updateSubSelect() { let g = document.getElementById('fileGrade').value; let subs = Object.keys(DB[g] || {}); document.getElementById('fileSubject').innerHTML = subs.map(s=>`<option value="${s}">${s}</option>`).join(''); }
    async function updateDelSubject() { let g = document.getElementById('delGrade').value; let subs = Object.keys(DB[g] || {}); document.getElementById('delSubject').innerHTML = subs.map(s=>`<option value="${s}">${s}</option>`).join(''); let grade = g, subject = document.getElementById('delSubject').value, fileSelect = document.getElementById('delFileSelect'); if(!subject || !DB[grade][subject]) { fileSelect.innerHTML = '<option value="">حذف فایل خاص</option>'; return; } let files = DB[grade][subject]; fileSelect.innerHTML = '<option value="">--- حذف فایل خاص ---</option>' + files.map((f,idx)=>`<option value="${idx}">${f.name}</option>`).join(''); }
    async function deleteItem() { let grade = document.getElementById('delGrade').value, subject = document.getElementById('delSubject').value, fileIndex = document.getElementById('delFileSelect').value; if(!subject) return; if(fileIndex !== "") { if(confirm('حذف فایل؟')) { DB[grade][subject].splice(parseInt(fileIndex),1); if(DB[grade][subject].length===0) delete DB[grade][subject]; await saveData(); renderAdmin(); } } else { if(confirm(`حذف کامل درس "${subject}"؟`)) { delete DB[grade][subject]; await saveData(); renderAdmin(); } } }
    async function addSubject() { let grade = document.getElementById('newGrade').value, name = document.getElementById('newSubject').value.trim(); if(!name) return; if(!DB[grade]) DB[grade] = {}; if(DB[grade][name]) return; DB[grade][name] = []; await saveData(); renderAdmin(); }
    async function addFile() { let grade = document.getElementById('fileGrade').value, subject = document.getElementById('fileSubject').value, name = document.getElementById('fileName').value.trim(), type = document.getElementById('fileType').value, price = document.getElementById('filePrice').value, link = document.getElementById('fileLink').value, code = document.getElementById('fileCode').value; if(!name || !subject) return; if(!DB[grade][subject]) DB[grade][subject] = []; DB[grade][subject].push({ name, type, price, link: price==='free'?link:'', code: price==='paid'?(code||Math.random().toString(36).substr(2,8)):'' }); await saveData(); renderAdmin(); }

    loadData();
</script>
